<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小塔小游戏 - 太空射击</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Chalkboard SE','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
#app{width:100%;max-width:780px;padding:12px;position:relative}
.page{display:none;flex-direction:column;align-items:center}
.page.active{display:flex}
.game-header{text-align:center;margin-bottom:12px;width:100%}
.game-header h1{font-size:clamp(24px,5vw,38px);color:#fff;text-shadow:0 0 20px rgba(100,200,255,.5),0 0 60px rgba(100,200,255,.2);letter-spacing:2px}
.game-header .subtitle{font-size:clamp(12px,2.5vw,16px);color:#8ab4f8;margin-top:4px}
#charSelect .char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0;width:100%;max-width:540px}
.char-card{background:linear-gradient(145deg,#1a1a3e,#0d0d2b);border-radius:20px;padding:16px 10px 12px;cursor:pointer;text-align:center;border:2px solid transparent;transition:all .25s;position:relative;overflow:hidden}
.char-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,var(--glow-color,rgba(100,200,255,.1)) 0%,transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none}
.char-card:hover::before{opacity:1}
.char-card:hover{transform:translateY(-3px);border-color:var(--glow-color,rgba(100,200,255,.3))}
.char-card.selected{border-color:var(--glow-color,#4dc9f6);background:linear-gradient(145deg,#1e1e4e,#12123a);box-shadow:0 0 20px var(--glow-color,rgba(77,201,246,.3))}
.char-card .ship-preview{width:72px;height:72px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.char-card .ship-preview canvas{width:72px;height:72px}
.char-card .char-name{font-size:15px;color:#fff;font-weight:bold}
.char-card .char-stat{font-size:11px;color:#8ab4f8;margin-top:3px;opacity:.8}
.char-card .stat-bars{display:flex;gap:4px;justify-content:center;margin-top:6px}
.char-card .stat-bar{width:20px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);overflow:hidden}
.char-card .stat-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.btn-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.btn-start{background:linear-gradient(135deg,#ff6b35,#ff8c5a);color:#fff;border:none;border-radius:20px;padding:14px 48px;font-size:20px;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #c44a1e,0 6px 20px rgba(255,107,53,.3);font-family:inherit;transition:all .1s}
.btn-start:active{transform:translateY(4px);box-shadow:0 2px 0 #c44a1e,0 6px 20px rgba(255,107,53,.3)}
.btn-home{background:rgba(255,255,255,.12);color:#aaa;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:10px 24px;font-size:15px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-home:hover{background:rgba(255,255,255,.2);color:#fff}
.btn-home:active{transform:translateY(2px)}
.btn-small{background:rgba(255,255,255,.1);color:#ccc;border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px 16px;font-size:13px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-small:hover{background:rgba(255,255,255,.2);color:#fff}
#gameUI{width:100%}
.info-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:8px 16px;margin-bottom:8px;gap:6px}
.info-bar .info-item{display:flex;align-items:center;gap:6px;font-size:clamp(13px,2.5vw,16px);color:#e0e0ff;font-weight:bold}
.info-bar .info-item .icon{font-size:18px}
.info-bar .info-item .num{color:#fff;min-width:24px;text-align:center}
.canvas-wrap{position:relative;width:100%;max-width:700px;aspect-ratio:1;border-radius:16px;overflow:hidden;background:#0a0a1a;box-shadow:0 0 40px rgba(50,100,255,.15),inset 0 0 60px rgba(0,0,0,.5)}
.canvas-wrap canvas{display:block;width:100%;height:100%}
#pauseOverlay{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:10;border-radius:16px}
#pauseOverlay.show{display:flex}
#pauseOverlay h2{font-size:clamp(28px,6vw,44px);color:#fff;margin-bottom:8px;text-shadow:0 0 30px rgba(100,200,255,.5)}
#pauseOverlay p{color:#8ab4f8;font-size:16px;margin-bottom:20px}
#gameOver{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:20;border-radius:16px}
#gameOver.show{display:flex}
#gameOver h2{font-size:clamp(32px,7vw,52px);color:#ff6b35;margin-bottom:4px;text-shadow:0 0 30px rgba(255,107,53,.5)}
#gameOver .final-score{font-size:clamp(18px,4vw,28px);color:#fff;margin-bottom:2px}
#gameOver .high-score{font-size:14px;color:#ffd700;margin-bottom:4px}
#gameOver .stats-row{display:flex;gap:20px;margin:8px 0 16px}
#gameOver .stats-row .stat-item{text-align:center}
#gameOver .stats-row .stat-item .stat-num{font-size:22px;color:#fff;font-weight:bold}
#gameOver .stats-row .stat-item .stat-label{font-size:11px;color:#8ab4f8}
#startScreen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;border-radius:16px}
#startScreen .title{font-size:clamp(28px,6vw,44px);color:#fff;text-shadow:0 0 40px rgba(100,200,255,.4);margin-bottom:6px}
#startScreen .sub{color:#8ab4f8;font-size:16px;margin-bottom:20px;text-align:center;line-height:1.6}
#startScreen .controls-info{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
#startScreen .controls-info .ctrl-item{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 16px;text-align:center;min-width:90px}
#startScreen .controls-info .ctrl-item .key{color:#fff;font-size:18px;font-weight:bold}
#startScreen .controls-info .ctrl-item .desc{color:#8ab4f8;font-size:11px;margin-top:2px}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(255,107,53,.3)}50%{box-shadow:0 0 40px rgba(255,107,53,.6)}}
.pulse-btn{animation:pulseGlow 2s ease-in-out infinite}
.tip-bar{width:100%;max-width:700px;text-align:center;margin-top:6px;color:rgba(255,255,255,.3);font-size:12px}
@media(max-width:480px){
  #app{padding:8px}
  #charSelect .char-grid{grid-template-columns:repeat(3,1fr);gap:10px}
  .char-card{padding:12px 6px 10px}
  .char-card .ship-preview{width:56px;height:56px}
  .char-card .ship-preview canvas{width:56px;height:56px}
  .char-card .char-name{font-size:13px}
  .info-bar{padding:6px 10px;flex-wrap:wrap}
  .btn-start{padding:12px 32px;font-size:17px}
  #startScreen .controls-info{gap:8px}
  #startScreen .controls-info .ctrl-item{padding:8px 12px;min-width:70px}
}
</style>
</head>
<body>

<div id="app">
<div class="page active" id="charSelect">

  <div class="game-header">
    <h1>🚀 太空射击</h1>
    <div class="subtitle">✨ 选择你的战舰，保卫地球！ ✨</div>
  </div>

  <div id="shipGrid" class="char-grid"></div>

  <div class="btn-row">
    <button class="btn-start pulse-btn" onclick="startGame()">🚀 出发!</button>
    <button class="btn-home" onclick="goHome()">🏠 返回</button>
  </div>

</div>

<div class="page" id="gameUI">
  <div class="info-bar">
    <div class="info-item"><span class="icon">❤️</span><span class="num" id="livesDisplay">3</span></div>
    <div class="info-item"><span class="icon">⭐</span><span class="num" id="scoreDisplay">0</span></div>
    <div class="info-item"><span class="icon">🎯</span><span class="num" id="levelDisplay">1</span></div>
    <div class="info-item"><span class="icon">💥</span><span class="num" id="enemyCount">0</span></div>
    <div>
      <button class="btn-small" onclick="togglePause()">⏸️ 暂停</button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>

    <div id="startScreen">
      <div class="title">🚀 准备战斗</div>
      <div class="sub">键盘 <b>←↑→↓</b> 或 <b>WASD</b> 移动<br>鼠标 / 手指 也可以控制移动哦!</div>
      <div class="controls-info">
        <div class="ctrl-item"><div class="key">🖱️</div><div class="desc">鼠标移动</div></div>
        <div class="ctrl-item"><div class="key">⏏</div><div class="desc">自动射击</div></div>
        <div class="ctrl-item"><div class="key">P</div><div class="desc">暂停</div></div>
      </div>
      <button class="btn-start" onclick="resumeGame()">🎮 开始!</button>
    </div>

    <div id="pauseOverlay">
      <h2>⏸️ 暂停</h2>
      <p>按 <b>P</b> 或点击继续</p>
      <button class="btn-start" onclick="togglePause()">▶️ 继续</button>
    </div>

    <div id="gameOver">
      <h2>💥 坠毁</h2>
      <div class="final-score">得分: <span id="finalScore">0</span></div>
      <div class="high-score">🏆 最高记录: <span id="highScoreDisplay">0</span></div>
      <div class="stats-row">
        <div class="stat-item"><div class="stat-num" id="statEnemies">0</div><div class="stat-label">击毁</div></div>
        <div class="stat-item"><div class="stat-num" id="statLevel">1</div><div class="stat-label">到达关卡</div></div>
        <div class="stat-item"><div class="stat-num" id="statPowerups">0</div><div class="stat-label">拾取道具</div></div>
      </div>
      <div class="btn-row">
        <button class="btn-start" onclick="restartGame()">🔄 再来一局</button>
        <button class="btn-home" onclick="backToSelect()">🏠 选船</button>
      </div>
    </div>
  </div>

  <div class="tip-bar">💡 收集道具: ⚡速射 🛡️护盾 💫散弹 ❤️回血</div>
</div>
</div>

<script>
// ============================================================
//  Ship configurations
// ============================================================
const SHIPS = [
  {id:'blaze', name:'烈焉号', desc:'均衡型', color:'#ff4433', glow:'rgba(255,68,51,.5)', speed:4, fireRate:8, damage:1, bulletSize:4, spread:0, hp:3, bars:{spd:3, fir:3, dmg:2, hp:3}},
  {id:'frost', name:'寒冰号', desc:'速射型', color:'#44ccff', glow:'rgba(68,204,255,.5)', speed:4.5, fireRate:5, damage:1, bulletSize:3, spread:0, hp:3, bars:{spd:3, fir:5, dmg:1, hp:3}},
  {id:'volt', name:'闪电号', desc:'极速型', color:'#ffdd00', glow:'rgba(255,221,0,.5)', speed:6, fireRate:7, damage:1, bulletSize:3, spread:0, hp:2, bars:{spd:5, fir:3, dmg:1, hp:2}},
  {id:'shadow', name:'暗影号', desc:'强攻型', color:'#aa44ff', glow:'rgba(170,68,255,.5)', speed:3.5, fireRate:9, damage:2, bulletSize:4, spread:1, hp:3, bars:{spd:2, fir:2, dmg:5, hp:3}},
  {id:'stellar', name:'星辰号', desc:'散射型', color:'#00ffcc', glow:'rgba(0,255,204,.5)', speed:4, fireRate:9, damage:1, bulletSize:3, spread:3, hp:3, bars:{spd:3, fir:2, dmg:1, hp:3}},
  {id:'phoenix', name:'凤凰号', desc:'生存型', color:'#ff8833', glow:'rgba(255,136,51,.5)', speed:3.5, fireRate:7, damage:1, bulletSize:4, spread:0, hp:5, bars:{spd:2, fir:3, dmg:2, hp:5}}
];

let selectedShip = 0;
const CANVAS_SIZE = 700;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
let gameRunning = false, gamePaused = false, gameOver = false;
let player, bullets, enemies, particles, powerups, stars, enemyBullets;
let keys = {}, mouseX, mouseY, useMouseControl = false;
let score = 0, level = 1, enemiesDestroyed = 0, powerupsCollected = 0;
let frameCount = 0, spawnTimer = 0, levelTimer = 0;
let highScore = parseInt(localStorage.getItem('spaceShooterHigh')||'0');
let animId = null;

function initCanvas(){
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio||1;
  const size = Math.min(rect.width, rect.height, CANVAS_SIZE);
  canvas.style.width = size+'px';
  canvas.style.height = size+'px';
  W = H = CANVAS_SIZE;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function drawShipPreview(pCtx, w, h, ship){
  pCtx.save();
  pCtx.translate(w/2, h/2);
  const g = pCtx.createRadialGradient(0,0,2,0,0,30);
  g.addColorStop(0, ship.glow);
  g.addColorStop(1, 'transparent');
  pCtx.fillStyle = g;
  pCtx.beginPath();
  pCtx.arc(0,0,30,0,Math.PI*2);
  pCtx.fill();
  pCtx.beginPath();
  pCtx.moveTo(0,-18); pCtx.lineTo(-14,14); pCtx.lineTo(-4,10);
  pCtx.lineTo(0,14); pCtx.lineTo(4,10); pCtx.lineTo(14,14);
  pCtx.closePath();
  pCtx.fillStyle = ship.color;
  pCtx.fill();
  pCtx.strokeStyle = 'rgba(255,255,255,.4)';
  pCtx.lineWidth = 1;
  pCtx.stroke();
  pCtx.beginPath();
  pCtx.arc(0,-4,5,0,Math.PI*2);
  pCtx.fillStyle = 'rgba(255,255,255,.25)';
  pCtx.fill();
  pCtx.fillStyle = ship.color;
  pCtx.globalAlpha = .6;
  pCtx.beginPath();
  pCtx.moveTo(-10,6); pCtx.lineTo(-20,18); pCtx.lineTo(-8,12);
  pCtx.closePath(); pCtx.fill();
  pCtx.beginPath();
  pCtx.moveTo(10,6); pCtx.lineTo(20,18); pCtx.lineTo(8,12);
  pCtx.closePath(); pCtx.fill();
  pCtx.globalAlpha = 1;
  pCtx.beginPath();
  pCtx.moveTo(-5,14); pCtx.lineTo(0,24); pCtx.lineTo(5,14);
  pCtx.closePath();
  pCtx.fillStyle = '#ff8800'; pCtx.fill();
  pCtx.beginPath();
  pCtx.moveTo(-3,14); pCtx.lineTo(0,20); pCtx.lineTo(3,14);
  pCtx.closePath();
  pCtx.fillStyle = '#ffcc00'; pCtx.fill();
  pCtx.restore();
}

function renderShipCards(){
  const grid = document.getElementById('shipGrid');
  grid.innerHTML = '';
  SHIPS.forEach((s, i)=>{
    const card = document.createElement('div');
    card.className = 'char-card'+(i===selectedShip?' selected':'');
    card.style.setProperty('--glow-color', s.glow);
    card.onclick = ()=>{
      document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      selectedShip = i;
    };
    const pw = document.createElement('div');
    pw.className = 'ship-preview';
    const pc = document.createElement('canvas');
    pc.width = 72; pc.height = 72;
    drawShipPreview(pc.getContext('2d'),72,72,s);
    pw.appendChild(pc);
    card.appendChild(pw);
    const nm = document.createElement('div');
    nm.className = 'char-name'; nm.textContent = s.name;
    card.appendChild(nm);
    const ds = document.createElement('div');
    ds.className = 'char-stat'; ds.textContent = s.desc;
    card.appendChild(ds);
    const bars = document.createElement('div');
    bars.className = 'stat-bars';
    [{k:'spd',c:'#44ccff'},{k:'fir',c:'#ff8844'},{k:'dmg',c:'#ff4444'},{k:'hp',c:'#44ff88'}].forEach(lb=>{
      const bar = document.createElement('div');
      bar.className = 'stat-bar';
      const fill = document.createElement('div');
      fill.className = 'stat-bar-fill';
      fill.style.width = (s.bars[lb.k]/5*100)+'%';
      fill.style.background = lb.c;
      bar.appendChild(fill);
      bars.appendChild(bar);
    });
    card.appendChild(bars);
    grid.appendChild(card);
  });
}

// ===== Game Objects =====
class Star {
  constructor(){this.reset(true)}
  reset(init){this.x=Math.random()*W;this.y=init?Math.random()*H:-5;this.size=Math.random()*2.5+0.5;this.speed=this.size*0.4+0.2;this.brightness=Math.random()*0.6+0.4}
  update(){this.y+=this.speed;if(this.y>H+5)this.reset(false)}
  draw(){const a=this.brightness*(0.7+0.3*Math.sin(frameCount*0.02+this.x));ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}
}

class Player {
  constructor(ship){this.ship=ship;this.x=W/2;this.y=H-80;this.speed=ship.speed;this.fireRate=ship.fireRate;this.damage=ship.damage;this.bulletSize=ship.bulletSize;this.spread=ship.spread;this.maxHp=ship.hp;this.hp=ship.hp;this.fireCooldown=0;this.invincible=0;this.powerupTimer={rapid:0,shield:0,spread:0};this.trail=[]}
  update(){
    this.fireCooldown=Math.max(0,this.fireCooldown-1);this.invincible=Math.max(0,this.invincible-1);
    Object.keys(this.powerupTimer).forEach(k=>this.powerupTimer[k]=Math.max(0,this.powerupTimer[k]-1));
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['KeyA'])dx=-1;if(keys['ArrowRight']||keys['KeyD'])dx=1;
    if(keys['ArrowUp']||keys['KeyW'])dy=-1;if(keys['ArrowDown']||keys['KeyS'])dy=1;
    if(dx||dy){const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;useMouseControl=false}
    else if(useMouseControl){const mdx=mouseX-this.x,mdy=mouseY-this.y,d=Math.sqrt(mdx*mdx+mdy*mdy);if(d>5){dx=mdx/d;dy=mdy/d}}
    this.x+=dx*this.speed;this.y+=dy*this.speed;
    this.x=Math.max(16,Math.min(W-16,this.x));this.y=Math.max(20,Math.min(H-20,this.y));
    this.trail.push({x:this.x,y:this.y,life:12});if(this.trail.length>20)this.trail.shift();
    this.trail.forEach(t=>t.life--);this.trail=this.trail.filter(t=>t.life>0);
    if(gameRunning&&!gamePaused)this.shoot();
  }
  shoot(){
    const rate=this.powerupTimer.rapid>0?Math.max(3,this.fireRate-3):this.fireRate;
    if(this.fireCooldown>0)return;this.fireCooldown=rate;
    const spread=this.powerupTimer.spread>0?Math.max(this.spread,3):this.spread;
    const cnt=spread>0?3:1;const as=spread>0?0.12:0;
    for(let i=0;i<cnt;i++){const a=(i-(cnt-1)/2)*as;bullets.push(new Bullet(this.x+Math.sin(a)*4,this.y-16,Math.sin(a)*3,-8,this.damage,this.powerupTimer.shield>0?this.bulletSize*1.5:this.bulletSize,this.powerupTimer.shield>0))}
    for(let i=0;i<3;i++)particles.push(new Particle(this.x+(Math.random()-0.5)*8,this.y-16,(Math.random()-0.5)*2,-Math.random()*3-1,'hsl('+(40+Math.random()*20)+',100%,'+(60+Math.random()*30)+'%)',4+Math.random()*3,8+Math.random()*6))
  }
  draw(){
    this.trail.forEach((t,i)=>{const a=t.life/12*0.3;ctx.fillStyle='rgba(255,150,50,'+a+')';ctx.beginPath();ctx.arc(t.x,t.y-(16)*(1-t.life/12),3*(1-t.life/12),0,Math.PI*2);ctx.fill()});
    const s=this.ship;ctx.save();ctx.translate(this.x,this.y);
    if(this.invincible>0&&Math.floor(this.invincible/4)%2===0)ctx.globalAlpha=0.4;
    const g=ctx.createRadialGradient(0,0,5,0,0,35);g.addColorStop(0,s.glow);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(-16,16);ctx.lineTo(-5,11);ctx.lineTo(0,16);ctx.lineTo(5,11);ctx.lineTo(16,16);ctx.closePath();
    ctx.fillStyle=s.color;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=s.color;ctx.globalAlpha*=0.5;
    ctx.beginPath();ctx.moveTo(-12,8);ctx.lineTo(-24,22);ctx.lineTo(-9,14);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(12,8);ctx.lineTo(24,22);ctx.lineTo(9,14);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;ctx.beginPath();ctx.arc(0,-6,6,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.2)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
    const fl=12+Math.sin(frameCount*0.3)*4;ctx.beginPath();ctx.moveTo(-6,16);ctx.lineTo(0,16+fl);ctx.lineTo(6,16);ctx.closePath();
    const fg=ctx.createLinearGradient(0,16,0,16+fl);fg.addColorStop(0,'#ffcc00');fg.addColorStop(0.5,'#ff6600');fg.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=fg;ctx.fill();
    if(this.powerupTimer.shield>0){ctx.strokeStyle='rgba(0,255,200,'+(0.2+0.15*Math.sin(frameCount*0.1))+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.stroke()}
    ctx.restore();
  }
  getHitBox(){return{x:this.x-10,y:this.y-16,w:20,h:32}}
  takeDamage(dmg){
    if(this.invincible>0)return false;
    if(this.powerupTimer.shield>0){this.powerupTimer.shield=0;this.invincible=30;for(let i=0;i<15;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+1;particles.push(new Particle(this.x+Math.cos(a)*20,this.y+Math.sin(a)*20,Math.cos(a)*sp,Math.sin(a)*sp,'#00ffcc',4+Math.random()*3,15+Math.random()*10))}return false}
    this.hp-=dmg;this.invincible=40;
    for(let i=0;i<10;i++)particles.push(new Particle(this.x+(Math.random()-0.5)*20,this.y+(Math.random()-0.5)*20,(Math.random()-0.5)*5,(Math.random()-0.5)*5,'#ff4400',3+Math.random()*3,10+Math.random()*10));
    updateHUD();if(this.hp<=0)return true;return false;
  }
}

class Bullet {
  constructor(x,y,vx,vy,damage,size,pierce){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.damage=damage;this.size=size;this.pierce=pierce||false;this.alive=true;this.trail=[]}
  update(){this.trail.push({x:this.x,y:this.y});if(this.trail.length>5)this.trail.shift();this.x+=this.vx;this.y+=this.vy;if(this.y<-20||this.y>H+20||this.x<-20||this.x>W+20)this.alive=false}
  draw(){this.trail.forEach((t,i)=>{const a=(i+1)/this.trail.length*0.3;ctx.fillStyle='rgba(255,255,100,'+a+')';ctx.beginPath();ctx.arc(t.x,t.y,this.size*(i/this.trail.length),0,Math.PI*2);ctx.fill()});const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size+3);g.addColorStop(0,'#fff');g.addColorStop(0.3,'#ffdd44');g.addColorStop(1,'rgba(255,200,50,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.size+3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill()}
  getHitBox(){return{x:this.x-this.size-2,y:this.y-this.size-2,w:(this.size+2)*2,h:(this.size+2)*2}}
}

const ENEMY_TYPES = {
  basic:{hp:1,speed:1.2,size:18,score:100,color:'rgb(255,68,68)',canShoot:false,pattern:'straight'},
  fast:{hp:1,speed:2.2,size:14,score:150,color:'rgb(255,136,0)',canShoot:false,pattern:'zigzag'},
  tank:{hp:4,speed:0.7,size:24,score:300,color:'rgb(170,68,255)',canShoot:false,pattern:'straight'},
  shooter:{hp:1,speed:0.9,size:18,score:200,color:'rgb(255,34,34)',canShoot:true,shootInterval:80,pattern:'sine'},
  boss:{hp:15,speed:0.4,size:32,score:1000,color:'rgb(255,0,102)',canShoot:true,shootInterval:50,pattern:'dive'}
};

class Enemy {
  constructor(type,level){
    this.type=type;this.alive=true;this.flashTimer=0;
    const cfg=ENEMY_TYPES[type];this.hp=cfg.hp+Math.floor(level/3);this.maxHp=this.hp;
    this.speed=cfg.speed+level*0.05;this.size=cfg.size;this.score=cfg.score;
    this.color=cfg.color;this.canShoot=cfg.canShoot;
    this.shootInterval=cfg.shootInterval||0;this.shootTimer=Math.random()*this.shootInterval;
    this.x=Math.random()*(W-60)+30;this.y=-30;this.pattern=cfg.pattern||'straight';
    this.startX=this.x;this.time=0;this.zigSpeed=0.02+Math.random()*0.02;
  }
  update(){
    this.time++;this.flashTimer=Math.max(0,this.flashTimer-1);
    switch(this.pattern){
      case'straight':this.y+=this.speed;break;
      case'zigzag':this.y+=this.speed;this.x+=Math.sin(this.time*this.zigSpeed)*1.5;break;
      case'sine':this.y+=this.speed*0.8;this.x=this.startX+Math.sin(this.time*0.03)*80;break;
      case'dive':if(this.y<80){this.y+=this.speed*0.7;this.x+=(this.startX-this.x)*0.02}else{this.y+=this.speed*1.3;this.x+=Math.sin(this.time*0.05)*3}break;
    }
    if(this.y>H+40)this.alive=false;
    if(this.canShoot&&this.y>0&&this.y<H*0.7){this.shootTimer--;if(this.shootTimer<=0){this.shootTimer=this.shootInterval-Math.min(30,Math.floor(level*2));enemyBullets.push(new EnemyBullet(this.x,this.y+this.size/2))}}
  }
  draw(){
    ctx.save();ctx.translate(this.x,this.y);const s=this.size;
    const gg=ctx.createRadialGradient(0,0,2,0,0,s+8);gg.addColorStop(0,this.color.replace(')',',0.2)').replace('rgb','rgba'));gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(0,0,s+8,0,Math.PI*2);ctx.fill();
    const cm={basic:'#ff4444',fast:'#ff8800',tank:'#aa44ff',shooter:'#ff2222',boss:'#ff0066'};
    const col=this.flashTimer>0?'#fff':(cm[this.type]||'#ff4444');
    if(this.type==='boss'){
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(-s*0.7,-s*0.3);ctx.lineTo(-s,s*0.2);ctx.lineTo(-s*0.7,s*0.5);ctx.lineTo(-s*0.3,s);ctx.lineTo(s*0.3,s);ctx.lineTo(s*0.7,s*0.5);ctx.lineTo(s,s*0.2);ctx.lineTo(s*0.7,-s*0.3);ctx.closePath();
      ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.stroke();
      ctx.beginPath();ctx.arc(0,-2,s*0.25,0,Math.PI*2);ctx.fillStyle='#ff0000';ctx.fill();
      ctx.beginPath();ctx.arc(0,-2,s*0.12,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    } else {
      ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(-s*0.6,-s*0.1);ctx.lineTo(-s*0.8,s*0.4);ctx.lineTo(-s*0.4,s);ctx.lineTo(0,s*0.7);ctx.lineTo(s*0.4,s);ctx.lineTo(s*0.8,s*0.4);ctx.lineTo(s*0.6,-s*0.1);ctx.closePath();
      ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.stroke();
    }
    if((this.type==='tank'||this.type==='boss')&&this.hp<this.maxHp){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-s,-s-8,s*2,4);ctx.fillStyle=this.flashTimer>0?'#fff':'#ff4444';ctx.fillRect(-s,-s-8,s*2*(this.hp/this.maxHp),4)}
    ctx.restore();
  }
  getHitBox(){const s=this.size;return{x:this.x-s*0.6,y:this.y-s*0.8,w:s*1.2,h:s*1.6}}
  takeDamage(dmg){this.hp-=dmg;this.flashTimer=4;if(this.hp<=0){this.alive=false;return true}return false}
}

class EnemyBullet {
  constructor(x,y){this.x=x;this.y=y;const a=Math.atan2(player.y-y,player.x-x);const sp=2+level*0.15;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;this.alive=true;this.size=4}
  update(){this.x+=this.vx;this.y+=this.vy;if(this.y<-20||this.y>H+20||this.x<-20||this.x>W+20)this.alive=false}
  draw(){const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,8);g.addColorStop(0,'#ff4444');g.addColorStop(0.5,'#ff0000');g.addColorStop(1,'rgba(255,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8888';ctx.beginPath();ctx.arc(this.x,this.y,4,0,Math.PI*2);ctx.fill()}
  getHitBox(){return{x:this.x-5,y:this.y-5,w:10,h:10}}
}

class Particle {
  constructor(x,y,vx,vy,color,size,lifetime){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.color=color;this.size=size;this.life=lifetime;this.maxLife=lifetime;this.alive=true}
  update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.98;this.vy*=0.98;this.vy+=0.05;this.life--;if(this.life<=0)this.alive=false}
  draw(){const r=this.life/this.maxLife;ctx.globalAlpha=r;ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size*r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
}

class Powerup {
  constructor(x,y){this.x=x;this.y=y;this.alive=true;this.vy=1;this.time=0;this.type=['rapid','shield','spread','health'][Math.floor(Math.random()*4)];this.size=14}
  update(){this.y+=this.vy;this.time++;if(this.y>H+20)this.alive=false}
  draw(){ctx.save();ctx.translate(this.x,this.y);const p=1+Math.sin(this.time*0.08)*0.1;ctx.scale(p,p);const cs={rapid:'#ff6644',shield:'#00ffcc',spread:'#4488ff',health:'#44ff88'};const c=cs[this.type];const g=ctx.createRadialGradient(0,0,2,0,0,20);g.addColorStop(0,c);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.stroke();const ic={rapid:'\u26a1',shield:'\U0001f6e1\ufe0f',spread:'\U0001f4ab',health:'\u2764\ufe0f'};ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText(ic[this.type],0,1);ctx.restore()}
  getHitBox(){return{x:this.x-this.size,y:this.y-this.size,w:this.size*2,h:this.size*2}}
  apply(p){switch(this.type){case'rapid':p.powerupTimer.rapid=600;break;case'shield':p.powerupTimer.shield=480;break;case'spread':p.powerupTimer.spread=500;break;case'health':p.hp=Math.min(p.maxHp,p.hp+1);break}}
}

function initGame(){
  player=new Player(SHIPS[selectedShip]);bullets=[];enemies=[];particles=[];powerups=[];enemyBullets=[];stars=[];
  score=0;level=1;enemiesDestroyed=0;powerupsCollected=0;frameCount=0;spawnTimer=0;levelTimer=0;
  gameRunning=true;gamePaused=false;gameOver=false;
  for(let i=0;i<80;i++)stars.push(new Star());
  updateHUD();document.getElementById('startScreen').style.display='flex';
  document.getElementById('pauseOverlay').classList.remove('show');document.getElementById('gameOver').classList.remove('show');
}

function startGame(){document.getElementById('charSelect').classList.remove('active');document.getElementById('gameUI').classList.add('active');initCanvas();initGame();if(animId)cancelAnimationFrame(animId);gameLoop()}
function resumeGame(){document.getElementById('startScreen').style.display='none';gameRunning=true;gamePaused=false}
function togglePause(){if(gameOver)return;gamePaused=!gamePaused;document.getElementById('pauseOverlay').classList.toggle('show',gamePaused)}
function restartGame(){document.getElementById('gameOver').classList.remove('show');initGame();document.getElementById('startScreen').style.display='none';gameRunning=true;gamePaused=false}
function backToSelect(){gameRunning=false;gameOver=false;if(animId)cancelAnimationFrame(animId);document.getElementById('gameUI').classList.remove('active');document.getElementById('charSelect').classList.add('active');document.getElementById('gameOver').classList.remove('show');document.getElementById('pauseOverlay').classList.remove('show');renderShipCards()}
function goHome(){window.location.href='index.html'}
function updateHUD(){document.getElementById('livesDisplay').textContent=player?player.hp:0;document.getElementById('scoreDisplay').textContent=score;document.getElementById('levelDisplay').textContent=level;document.getElementById('enemyCount').textContent=enemies.length}
function rectCollide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function spawnEnemies(){
  const baseRate=Math.max(15,50-level*3);spawnTimer++;
  if(spawnTimer<baseRate)return;spawnTimer=0;
  const types=['basic'];if(level>=2)types.push('fast');if(level>=3)types.push('shooter');if(level>=4)types.push('tank');if(level>=5)types.push('fast','fast');if(level>=6)types.push('shooter','tank');
  const cnt=Math.min(1+Math.floor(level/3),4);
  for(let i=0;i<cnt;i++){const t=types[Math.floor(Math.random()*types.length)];enemies.push(new Enemy(t,level))}
  if(level%5===0&&enemies.filter(e=>e.type==='boss').length===0)enemies.push(new Enemy('boss',level));
}
function maybeDropPowerup(x,y){if(Math.random()<0.12)powerups.push(new Powerup(x,y))}

function gameLoop(){
  animId=requestAnimationFrame(gameLoop);frameCount++;
  if(!gameRunning||gamePaused||gameOver){drawScene();return}
  levelTimer++;if(levelTimer>1800){levelTimer=0;level++;updateHUD()}
  spawnEnemies();player.update();
  bullets.forEach(b=>b.update());bullets=bullets.filter(b=>b.alive);
  enemyBullets.forEach(b=>b.update());enemyBullets=enemyBullets.filter(b=>b.alive);
  enemies.forEach(e=>e.update());enemies=enemies.filter(e=>e.alive);
  particles.forEach(p=>p.update());particles=particles.filter(p=>p.alive);
  powerups.forEach(p=>p.update());powerups=powerups.filter(p=>p.alive);
  stars.forEach(s=>s.update());

  for(let b of bullets){if(!b.alive)continue;for(let e of enemies){if(!e.alive)continue;if(rectCollide(b.getHitBox(),e.getHitBox())){const k=e.takeDamage(b.damage);if(!b.pierce)b.alive=false;if(k){score+=e.score;enemiesDestroyed++;for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*4+1;particles.push(new Particle(e.x,e.y,Math.cos(a)*sp,Math.sin(a)*sp,['#ff4400','#ff8800','#ffcc00','#fff'][Math.floor(Math.random()*4)],3+Math.random()*4,15+Math.random()*15))}maybeDropPowerup(e.x,e.y)}else{for(let i=0;i<5;i++)particles.push(new Particle(b.x,b.y,(Math.random()-0.5)*4,(Math.random()-0.5)*4,'#ffdd44',2+Math.random()*2,6+Math.random()*6))}updateHUD();break}}}
  for(let e of enemies){if(!e.alive)continue;if(rectCollide(e.getHitBox(),player.getHitBox())){const k=player.takeDamage(1);e.alive=false;for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*5+1;particles.push(new Particle(e.x,e.y,Math.cos(a)*sp,Math.sin(a)*sp,['#ff4400','#ff8800','#ffcc00','#fff'][Math.floor(Math.random()*4)],3+Math.random()*4,20+Math.random()*20))}if(k){gameOverHandler();return}updateHUD()}}
  for(let b of enemyBullets){if(!b.alive)continue;if(rectCollide(b.getHitBox(),player.getHitBox())){b.alive=false;const k=player.takeDamage(1);if(k){gameOverHandler();return}updateHUD()}}
  for(let p of powerups){if(!p.alive)continue;if(rectCollide(p.getHitBox(),player.getHitBox())){p.alive=false;p.apply(player);powerupsCollected++;for(let i=0;i<10;i++)particles.push(new Particle(p.x,p.y,(Math.random()-0.5)*3,(Math.random()-0.5)*3,['#ff6644','#00ffcc','#4488ff','#44ff88'][{rapid:0,shield:1,spread:2,health:3}[p.type]],3+Math.random()*2,12+Math.random()*8));updateHUD()}}
  drawScene();
}

function gameOverHandler(){
  gameOver=true;gameRunning=false;
  const ph=parseInt(localStorage.getItem('spaceShooterHigh')||'0');
  if(score>ph)localStorage.setItem('spaceShooterHigh',score);
  document.getElementById('finalScore').textContent=score;document.getElementById('highScoreDisplay').textContent=Math.max(score,ph);
  document.getElementById('statEnemies').textContent=enemiesDestroyed;document.getElementById('statLevel').textContent=level;document.getElementById('statPowerups').textContent=powerupsCollected;
  if(player){for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*6+1;particles.push(new Particle(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,['#ff4400','#ff8800','#ffcc00','#fff','#ff2200'][Math.floor(Math.random()*5)],4+Math.random()*5,25+Math.random()*25))}}
  setTimeout(()=>document.getElementById('gameOver').classList.add('show'),800);
}

function drawScene(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  const ng=ctx.createRadialGradient(W*0.3,H*0.2,0,W*0.3,H*0.2,300);ng.addColorStop(0,'rgba(40,20,80,0.15)');ng.addColorStop(1,'transparent');ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
  const ng2=ctx.createRadialGradient(W*0.7,H*0.8,0,W*0.7,H*0.8,250);ng2.addColorStop(0,'rgba(20,40,80,0.12)');ng2.addColorStop(1,'transparent');ctx.fillStyle=ng2;ctx.fillRect(0,0,W,H);
  stars.forEach(s=>s.draw());powerups.forEach(p=>p.draw());bullets.forEach(b=>b.draw());enemyBullets.forEach(b=>b.draw());enemies.forEach(e=>e.draw());
  if(player&&!gameOver)player.draw();particles.forEach(p=>p.draw());
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='KeyP'&&gameRunning)togglePause();if(e.code==='Space'&&!gameRunning&&!gameOver&&document.getElementById('startScreen').style.display!=='none'){e.preventDefault();resumeGame()}});
document.addEventListener('keyup',e=>{keys[e.code]=false});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)*W/r.width;mouseY=(e.clientY-r.top)*H/r.height;useMouseControl=true});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),t=e.touches[0];mouseX=(t.clientX-r.left)*W/r.width;mouseY=(t.clientY-r.top)*H/r.height;useMouseControl=true},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(document.getElementById('startScreen').style.display!=='none'){resumeGame();return}const r=canvas.getBoundingClientRect(),t=e.touches[0];mouseX=(t.clientX-r.left)*W/r.width;mouseY=(t.clientY-r.top)*H/r.height;useMouseControl=true},{passive:false});
window.addEventListener('resize',()=>{if(document.getElementById('gameUI').classList.contains('active'))initCanvas()});
renderShipCards();
</script>
</body>
</html>
