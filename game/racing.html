<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>小塔小游戏 - 极速赛车</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Comic Sans MS","Chalkboard SE","PingFang SC","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,87,34,.2), transparent 45%),
    radial-gradient(circle at 80% 85%, rgba(33,150,243,.18), transparent 42%),
    linear-gradient(160deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;
}
#app{width:100%;max-width:780px;padding:12px;position:relative}
.page{display:none;flex-direction:column;align-items:center}
.page.active{display:flex}
.game-header{text-align:center;margin-bottom:10px;width:100%}
.game-header h1{
  font-size:clamp(22px,5vw,38px);color:#fff;letter-spacing:2px;
  text-shadow:0 3px 0 #c62828,0 0 24px rgba(255,87,34,.45);
}
.game-header .subtitle{font-size:clamp(12px,2.5vw,16px);color:#ffab91;margin-top:3px}
#charSelect .char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;width:100%;max-width:520px}
.char-card{
  background:#fff;border-radius:20px;padding:12px 8px 10px;cursor:pointer;text-align:center;
  box-shadow:0 4px 12px rgba(0,0,0,.2);transition:all .2s;border:3px solid transparent;
}
.char-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.25)}
.char-card.selected{border-color:#e53935;background:#ffebee}
.char-card.key-focus{box-shadow:0 0 0 3px #e53935,0 6px 20px rgba(0,0,0,.25);transform:translateY(-3px)}
.char-card .char-preview{
  width:64px;height:64px;margin:0 auto 6px;border-radius:50%;background:#f0ebe3;
  display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;
}
.char-card .char-preview img{width:100%;height:100%;object-fit:cover}
.char-card .char-name{font-size:13px;color:#5a3e1b;font-weight:bold}
.btn-start{
  background:linear-gradient(180deg,#ff7043,#e53935);color:#fff;border:none;border-radius:20px;
  padding:14px 48px;font-size:20px;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #b71c1c;font-family:inherit;margin-top:4px;
}
.btn-start:active{transform:translateY(2px);box-shadow:0 2px 0 #b71c1c}
.btn-home{
  background:#ddd;color:#5a3e1b;border:none;border-radius:14px;padding:10px 20px;
  font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #bbb;
}
.btn-home:active{transform:translateY(2px)}
.btn-pause{
  background:#ffc107;color:#5a3e1b;border:none;border-radius:14px;padding:8px 14px;
  font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #cc9a06;margin-right:6px;
}
.btn-pause:active{transform:translateY(2px)}
.info-bar{
  display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;
  background:rgba(255,255,255,.9);border-radius:16px;padding:8px 16px;margin-bottom:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);gap:8px;flex-wrap:wrap;
}
.info-bar .info-item{display:flex;align-items:center;gap:5px;font-size:clamp(13px,2.5vw,16px);color:#5a3e1b;font-weight:bold}
.game-wrapper{
  position:relative;width:100%;max-width:700px;aspect-ratio:3/4;border-radius:20px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 0 4px rgba(255,255,255,.15);touch-action:none;background:#263238;
}
#gameCanvas{display:block;width:100%;height:100%}
#hudOverlay{
  position:absolute;inset:0;pointer-events:none;z-index:5;
}
#hudScore{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-size:clamp(22px,5.5vw,40px);font-weight:bold;color:#fff;
  text-shadow:2px 2px 0 rgba(0,0,0,.5);text-align:center;
}
#hudSpeed{
  position:absolute;top:48px;left:50%;transform:translateX(-50%);
  font-size:clamp(12px,2.5vw,15px);color:#ffeb3b;font-weight:bold;
  text-shadow:1px 1px 0 rgba(0,0,0,.4);
}
#hudCombo{
  position:absolute;top:72px;left:50%;transform:translateX(-50%);
  font-size:clamp(14px,3vw,18px);color:#ff9800;font-weight:bold;
  text-shadow:1px 1px 0 rgba(0,0,0,.4);opacity:0;transition:opacity .2s;
}
#hudCombo.show{opacity:1}
#hudBuffs{
  position:absolute;top:10px;left:12px;display:flex;gap:6px;font-size:clamp(18px,4vw,24px);
}
#waveBanner{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(.8);
  background:rgba(0,0,0,.6);color:#fff;padding:12px 28px;border-radius:20px;
  font-size:clamp(18px,4vw,26px);font-weight:bold;opacity:0;transition:all .35s;
  border:2px solid rgba(255,235,59,.6);pointer-events:none;
}
#waveBanner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
#readyMsg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  font-size:clamp(16px,3.5vw,24px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4);
  text-align:center;font-weight:bold;line-height:1.6;
}
#readyMsg .tap-icon{font-size:clamp(36px,9vw,56px);display:block;margin-bottom:8px;animation:bounce 1s infinite}
#pauseMsg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(22px,5vw,32px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4);
  font-weight:bold;display:none;background:rgba(0,0,0,.55);padding:16px 32px;border-radius:20px;
}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#gameOverOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;
  align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px);
}
#gameOverOverlay.show{display:flex}
.win-card{
  background:#fff;border-radius:32px;padding:32px 28px 24px;text-align:center;
  max-width:400px;width:90%;box-shadow:0 12px 48px rgba(0,0,0,.35);
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.win-card .big-emoji{font-size:72px;margin-bottom:8px}
.win-card h2{font-size:28px;color:#c62828;margin-bottom:4px}
.win-card .score-big{font-size:52px;font-weight:bold;color:#e53935;margin:8px 0}
.win-card .best-label{font-size:16px;color:#8b6b3d;margin-bottom:16px}
.win-card .best-label span{color:#5a3e1b;font-weight:bold}
.win-card .new-best{
  display:inline-block;background:#ffd700;color:#5a3e1b;padding:4px 12px;border-radius:12px;
  font-size:14px;font-weight:bold;margin-bottom:10px;animation:pulse 1s infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.win-card .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.win-card button{
  padding:10px 24px;border:none;border-radius:14px;font-size:16px;font-weight:bold;
  cursor:pointer;font-family:inherit;box-shadow:0 3px 0 rgba(0,0,0,.15);
}
.win-card button:active{transform:translateY(2px)}
.win-card .btn-again{background:#e53935;color:#fff;box-shadow:0 3px 0 #b71c1c}
.win-card .btn-home{background:#ddd;color:#5a3e1b;box-shadow:0 3px 0 #bbb}
.touch-pad{
  display:none;width:100%;max-width:700px;margin-top:10px;justify-content:space-between;gap:12px;
}
@media(max-width:768px),(pointer:coarse){.touch-pad{display:flex}}
.lane-btn{
  flex:1;border:none;border-radius:16px;padding:16px 8px;font-size:28px;font-weight:bold;
  cursor:pointer;font-family:inherit;color:#fff;
  background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.08));
  border:2px solid rgba(255,255,255,.25);backdrop-filter:blur(4px);
}
.lane-btn.nitro{
  flex:0.8;background:linear-gradient(180deg,#fff176,#ffca28);
  color:#5a3e1b;border-color:rgba(255,235,59,.5);font-size:22px;
}
.lane-btn.nitro.active{box-shadow:0 0 16px rgba(255,235,59,.8);animation:pulse 0.5s infinite}
</style>
</head>
<body>

<div id="app">
  <div id="charSelect" class="page active">
    <div class="game-header">
      <h1>🏎️ 极速赛车 🏁</h1>
      <div class="subtitle">换道超车、吃道具、攒连击，冲最远！</div>
    </div>
    <div class="char-grid" id="charGrid"></div>
    <button class="btn-start" onclick="startGame()">出发！🏁</button>
    <div style="margin-top:12px"><button class="btn-home" onclick="location.href='index.html'">🏠 返回菜单</button></div>
  </div>

  <div id="gameUI" class="page">
    <div class="info-bar">
      <div class="info-item"><span id="charEmojiDisplay">🐰</span><span id="charNameDisplay">beta</span></div>
      <div class="info-item">❤️ <span id="livesDisplay">3</span></div>
      <div class="info-item">⭐ <span id="coinsDisplay">0</span></div>
      <div class="info-item">🔥 <span id="comboDisplay">x1</span></div>
      <div class="info-item">🏆 <span id="bestScoreDisplay">0</span></div>
      <div style="display:flex">
        <button class="btn-pause" id="btnPause" onclick="togglePause()">⏸️</button>
        <button class="btn-home" onclick="goHome()">🏠 菜单</button>
      </div>
    </div>
    <div class="game-wrapper" id="gameWrapper">
      <canvas id="gameCanvas"></canvas>
      <div id="hudOverlay">
        <div id="hudScore">0 m</div>
        <div id="hudSpeed">0 km/h</div>
        <div id="hudCombo"></div>
        <div id="hudBuffs"></div>
        <div id="waveBanner"></div>
        <div id="readyMsg"><span class="tap-icon">👆</span>← → 换道 · 空格/⚡ 氮气加速<br>吃道具、躲障碍、贴边超车加分！</div>
        <div id="pauseMsg">⏸ 已暂停</div>
      </div>
    </div>
    <div class="touch-pad">
      <button class="lane-btn" id="btnLeft">◀</button>
      <button class="lane-btn nitro" id="btnNitro">⚡</button>
      <button class="lane-btn" id="btnRight">▶</button>
    </div>
  </div>

  <div id="gameOverOverlay">
    <div class="win-card">
      <div class="big-emoji" id="goEmoji">💥</div>
      <h2>比赛结束</h2>
      <div id="newBestBadge" class="new-best" style="display:none">🎉 新纪录！</div>
      <div class="score-big" id="goScore">0 m</div>
      <div class="best-label">🏆 最远距离: <span id="goBest">0</span> m</div>
      <div class="btn-group">
        <button class="btn-again" onclick="restartGame()">再来一局 🔄</button>
        <button class="btn-home" onclick="goHome()">🏠 选角色</button>
      </div>
    </div>
  </div>
</div>

<script>
var CHARS = [
  {id:"a", nm:"beta",   em:"🐰", co:"#FFB7C5", img:"role/beta2.JPG"},
  {id:"b", nm:"dad",    em:"🦊", co:"#FFD700", img:"role/dad.JPG"},
  {id:"c", nm:"mum",    em:"👩", co:"#FF69B4", img:"role/mum.JPG"},
  {id:"i", nm:"Duggee", em:"🐶", co:"#FFB347", img:"role/duggee.png"},
  {id:"j", nm:"Betty",  em:"🐙", co:"#FF69B4", img:"role/betty.png"},
  {id:"k", nm:"Happy",  em:"🐸", co:"#90EE90", img:"role/happy.png"},
  {id:"l", nm:"Norrie", em:"🐭", co:"#87CEEB", img:"role/norrie.png"},
  {id:"m", nm:"Roly",   em:"🐹", co:"#DDA0DD", img:"role/roly.png"},
  {id:"n", nm:"Tag",    em:"🦏", co:"#FFD700", img:"role/tag.png"}
];

var CAR_COLORS = ["#e53935","#1e88e5","#43a047","#fb8c00","#8e24aa","#00acc1","#fdd835","#5c6bc0"];
var ENEMY_STYLES = [
  {id:"sedan", w:0.92, h:1.22},
  {id:"suv",   w:1.06, h:1.34},
  {id:"truck", w:1.14, h:1.58},
  {id:"sport", w:0.86, h:1.4}
];
var POWERUP_KINDS = ["shield","nitro","magnet","heart"];
var LANES = 3;

var sel = null, charKeyFocus = 0, imgCache = {};
var canvas, ctx, W, H;
var player, entities, particles, roadOffset, floatTexts;
var distance, coins, lives, bestScore, speed, maxSpeed;
var gameState, frameCount, spawnTimer, itemTimer, wave;
var gameLoopId = null, prevStateForPause = null;
var invincible = 0, shakeFrames = 0, inputBound = false, nitroHeld = false;
var laneX = [], roadL = 0, roadR = 0, playerY = 0, carW = 0, carH = 0;
var combo = 0, comboTimer = 0, buffs = {shield:0, nitro:0, magnet:0};
var waveBannerTimer = 0, skidMarks = [];

var audioCtx = null;
function unlockAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function playTone(freq, dur, type, vol){
  if(!audioCtx) return;
  try{
    var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.28, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function playLane(){ playTone(520, 0.06, "sine", 0.22); }
function playCoin(){
  playTone(880, 0.08, "sine", 0.3);
  setTimeout(function(){ playTone(1100, 0.1, "sine", 0.28); }, 70);
}
function playCrash(){
  playTone(160, 0.3, "sawtooth", 0.35);
  setTimeout(function(){ playTone(90, 0.25, "sawtooth", 0.3); }, 100);
}
function playSelect(){
  playTone(660, 0.08, "sine", 0.25);
  setTimeout(function(){ playTone(880, 0.1, "sine", 0.25); }, 60);
}
function playStart(){
  playTone(440, 0.1, "sine", 0.28);
  setTimeout(function(){ playTone(660, 0.1, "sine", 0.28); }, 80);
  setTimeout(function(){ playTone(880, 0.15, "sine", 0.3); }, 160);
}
function playPowerup(){
  playTone(740, 0.08, "sine", 0.3);
  setTimeout(function(){ playTone(980, 0.1, "sine", 0.28); }, 70);
  setTimeout(function(){ playTone(1180, 0.12, "sine", 0.26); }, 140);
}
function playNearMiss(){
  playTone(620, 0.06, "triangle", 0.22);
  setTimeout(function(){ playTone(900, 0.08, "triangle", 0.24); }, 50);
}
function playNitro(){
  playTone(180, 0.12, "sawtooth", 0.12);
}
function playWave(){
  playTone(523, 0.1, "sine", 0.28);
  setTimeout(function(){ playTone(784, 0.12, "sine", 0.3); }, 100);
}
function playNewBest(){
  playTone(880, 0.12, "sine", 0.32);
  setTimeout(function(){ playTone(1100, 0.12, "sine", 0.32); }, 120);
  setTimeout(function(){ playTone(1320, 0.2, "sine", 0.32); }, 240);
}

document.addEventListener("click", unlockAudio, {once:false});
document.addEventListener("touchstart", unlockAudio, {once:false, passive:true});
document.addEventListener("keydown", unlockAudio, {once:false});

function selectCharByIndex(idx){
  if(idx < 0 || idx >= CHARS.length) return;
  charKeyFocus = idx; sel = CHARS[idx];
  var cards = document.querySelectorAll("#charGrid .char-card");
  for(var k = 0; k < cards.length; k++) cards[k].classList.remove("selected", "key-focus");
  if(cards[idx]) cards[idx].classList.add("selected", "key-focus");
}
function buildCharGrid(){
  var grid = document.getElementById("charGrid");
  grid.innerHTML = "";
  for(var i = 0; i < CHARS.length; i++){
    (function(ch, idx){
      var card = document.createElement("div");
      card.className = "char-card";
      var preview = document.createElement("div");
      preview.className = "char-preview";
      if(ch.img){
        var img = new Image();
        img.onload = function(){ imgCache[ch.id] = img; };
        img.src = ch.img;
        var imgEl = document.createElement("img");
        imgEl.src = ch.img;
        imgEl.onerror = function(){ preview.textContent = ch.em; imgEl.remove(); };
        preview.appendChild(imgEl);
      } else {
        preview.textContent = ch.em;
      }
      var name = document.createElement("div");
      name.className = "char-name";
      name.textContent = ch.nm;
      card.appendChild(preview); card.appendChild(name);
      card.onclick = function(){ unlockAudio(); playSelect(); selectCharByIndex(idx); };
      grid.appendChild(card);
      if(idx === 0){ card.classList.add("selected"); sel = ch; }
    })(CHARS[i], i);
  }
}

function loadBest(){
  try{ bestScore = parseInt(localStorage.getItem("racingBest") || "0", 10) || 0; }
  catch(e){ bestScore = 0; }
  document.getElementById("bestScoreDisplay").textContent = bestScore;
}
function saveBest(){
  if(distance > bestScore){
    bestScore = distance;
    try{ localStorage.setItem("racingBest", String(bestScore)); }catch(e){}
  }
}

function resizeCanvas(){
  var wrap = document.getElementById("gameWrapper");
  var rect = wrap.getBoundingClientRect();
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.floor(rect.width * dpr);
  H = Math.floor(rect.height * dpr);
  canvas.width = W;
  canvas.height = H;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  var roadW = W * 0.76;
  roadL = (W - roadW) / 2;
  roadR = W - roadL;
  laneX = [];
  for(var i = 0; i < LANES; i++){
    laneX.push(roadL + roadW * (i + 0.5) / LANES);
  }
  playerY = H * 0.8;
  carW = roadW / LANES * 0.58;
  carH = carW * 1.5;
}

function resetGame(){
  player = { lane: 1, x: 0, targetLane: 1, tilt: 0, oilSlide: 0 };
  entities = [];
  particles = [];
  floatTexts = [];
  skidMarks = [];
  roadOffset = 0;
  distance = 0;
  coins = 0;
  lives = 3;
  speed = 1.6;
  maxSpeed = 5.5;
  frameCount = 0;
  spawnTimer = 0;
  itemTimer = 0;
  wave = 1;
  combo = 0;
  comboTimer = 0;
  buffs = {shield:0, nitro:0, magnet:0};
  invincible = 0;
  shakeFrames = 0;
  waveBannerTimer = 0;
  nitroHeld = false;
  updateHUD();
}

function updateHUD(){
  document.getElementById("hudScore").textContent = Math.floor(distance) + " m";
  var spd = speed * 12 * (buffs.nitro > 0 || nitroHeld ? 1.45 : 1);
  document.getElementById("hudSpeed").textContent = Math.floor(spd) + " km/h";
  document.getElementById("livesDisplay").textContent = lives;
  document.getElementById("coinsDisplay").textContent = coins;
  document.getElementById("bestScoreDisplay").textContent = bestScore;
  document.getElementById("comboDisplay").textContent = "x" + Math.min(5, Math.max(1, combo));
  var comboEl = document.getElementById("hudCombo");
  if(combo > 1 && comboTimer > 0){
    comboEl.textContent = "🔥 连击 x" + Math.min(5, combo);
    comboEl.classList.add("show");
  } else {
    comboEl.classList.remove("show");
  }
  var buffHtml = "";
  if(buffs.shield > 0 || invincible > 0) buffHtml += "🛡️";
  if(buffs.nitro > 0 || nitroHeld) buffHtml += "⚡";
  if(buffs.magnet > 0) buffHtml += "🧲";
  document.getElementById("hudBuffs").textContent = buffHtml;
  document.getElementById("btnNitro").classList.toggle("active", nitroHeld || buffs.nitro > 0);
  if(sel){
    document.getElementById("charEmojiDisplay").textContent = sel.em;
    document.getElementById("charNameDisplay").textContent = sel.nm;
  }
}

function addFloatText(x, y, text, color){
  floatTexts.push({x:x, y:y, text:text, color:color || "#fff", life:42});
}

function darkenColor(hex, n){
  var c = hex.replace("#","");
  if(c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  var r = Math.max(0, parseInt(c.slice(0,2),16) - n);
  var g = Math.max(0, parseInt(c.slice(2,4),16) - n);
  var b = Math.max(0, parseInt(c.slice(4,6),16) - n);
  return "rgb("+r+","+g+","+b+")";
}

function lightenColor(hex, n){
  var c = hex.replace("#","");
  if(c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  var r = Math.min(255, parseInt(c.slice(0,2),16) + n);
  var g = Math.min(255, parseInt(c.slice(2,4),16) + n);
  var b = Math.min(255, parseInt(c.slice(4,6),16) + n);
  return "rgb("+r+","+g+","+b+")";
}

function laneChange(dir){
  if(gameState !== "playing") return;
  if(player.oilSlide > 0) dir *= -1;
  var next = player.targetLane + dir;
  if(next >= 0 && next < LANES){
    player.targetLane = next;
    player.tilt = dir * 0.45;
    skidMarks.push({x:player.x, y:playerY + carH * 0.2, life:28, lane:player.lane});
    playLane();
  }
}

function pickEnemyStyle(){
  var r = Math.random();
  if(distance > 800 && r < 0.18) return ENEMY_STYLES[3];
  if(distance > 400 && r < 0.28) return ENEMY_STYLES[2];
  if(r < 0.35) return ENEMY_STYLES[1];
  return ENEMY_STYLES[0];
}

function spawnEnemy(){
  var lane = Math.floor(Math.random() * LANES);
  var style = pickEnemyStyle();
  var color = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];
  var tooClose = false;
  for(var i = 0; i < entities.length; i++){
    var e = entities[i];
    if(e.type === "enemy" && e.lane === lane && e.y < carH * 1.5){ tooClose = true; break; }
  }
  if(tooClose) return;
  entities.push({ type:"enemy", lane: lane, y: -carH * style.h, color: color, style: style, nearMissed:false });
}

function spawnPickup(kind){
  var lane = Math.floor(Math.random() * LANES);
  entities.push({ type: kind, lane: lane, y: -carH * 0.6, spin: Math.random() * Math.PI * 2 });
}

function spawnOil(){
  var lane = Math.floor(Math.random() * LANES);
  entities.push({ type:"oil", lane: lane, y: -carH * 0.4, spin: 0 });
}

function applyPowerup(kind){
  playPowerup();
  if(kind === "shield"){ buffs.shield = 420; invincible = Math.max(invincible, 30); }
  else if(kind === "nitro"){ buffs.nitro = 260; }
  else if(kind === "magnet"){ buffs.magnet = 320; }
  else if(kind === "heart"){ lives = Math.min(5, lives + 1); }
  addFloatText(player.x, playerY - 30, ({shield:"🛡️",nitro:"⚡",magnet:"🧲",heart:"+1❤️"})[kind], "#fff");
}

function bumpCombo(){
  combo = Math.min(5, combo + 1);
  comboTimer = 150;
}

function addParticles(x, y, color, n){
  for(var i = 0; i < n; i++){
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      life: 20 + Math.random() * 15,
      color: color,
      size: 3 + Math.random() * 4
    });
  }
}

function laneXAt(lane){
  var li = Math.floor(lane);
  var frac = lane - li;
  if(li >= LANES - 1) return laneX[LANES - 1];
  return laneX[li] + (laneX[li + 1] - laneX[li]) * frac;
}

function drawRoad(){
  ctx.fillStyle = "#2e7d32";
  ctx.fillRect(0, 0, W, H);

  for(var t = 0; t < 16; t++){
    var ty = ((t * 95 - roadOffset * 0.55) % (H + 100)) - 50;
    var tx = t % 2 === 0 ? roadL * 0.28 : W - roadL * 0.28;
    ctx.fillStyle = t % 3 === 0 ? "#256d28" : "#388e3c";
    ctx.beginPath();
    ctx.ellipse(tx, ty, 14 + (t % 5) * 4, 10 + (t % 3) * 3, 0, 0, Math.PI * 2);
    ctx.fill();
    if(t % 4 === 0){
      ctx.fillStyle = "#43a047";
      ctx.beginPath();
      ctx.arc(tx + 8, ty + 6, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  var roadGrad = ctx.createLinearGradient(roadL, 0, roadR, 0);
  roadGrad.addColorStop(0, "#4e4e4e");
  roadGrad.addColorStop(0.08, "#6d6d6d");
  roadGrad.addColorStop(0.5, "#757575");
  roadGrad.addColorStop(0.92, "#6d6d6d");
  roadGrad.addColorStop(1, "#4e4e4e");
  ctx.fillStyle = roadGrad;
  ctx.fillRect(roadL, 0, roadR - roadL, H);

  ctx.fillStyle = "#eeeeee";
  ctx.fillRect(roadL - 6, 0, 6, H);
  ctx.fillRect(roadR, 0, 6, H);
  ctx.fillStyle = "#c62828";
  ctx.fillRect(roadL - 6, 0, 6, 14);
  ctx.fillRect(roadR, 0, 6, 14);

  var dashLen = 40;
  roadOffset = (roadOffset + speed * (buffs.nitro > 0 || nitroHeld ? 1.55 : 1.1)) % dashLen;
  for(var i = 0; i < LANES - 1; i++){
    var lx = roadL + (roadR - roadL) * (i + 1) / LANES;
    for(var y = -dashLen; y < H + dashLen; y += dashLen){
      var dy = y + roadOffset;
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillRect(lx - 2, dy, 4, dashLen * 0.5);
    }
  }

  for(var s = 0; s < skidMarks.length; s++){
    var m = skidMarks[s];
    ctx.globalAlpha = m.life / 28 * 0.35;
    ctx.strokeStyle = "#212121";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(m.x - carW * 0.2, m.y);
    ctx.lineTo(m.x - carW * 0.1, m.y + 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(m.x + carW * 0.2, m.y);
    ctx.lineTo(m.x + carW * 0.1, m.y + 8);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawWheel(wx, wy, r){
  ctx.fillStyle = "#1a1a1a";
  ctx.beginPath();
  ctx.ellipse(wx, wy, r, r * 1.15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#bdbdbd";
  ctx.beginPath();
  ctx.ellipse(wx, wy, r * 0.45, r * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawStyledCar(x, y, styleDef, color, isPlayer, facingDown){
  ctx.save();
  ctx.translate(x, y);
  if(facingDown) ctx.rotate(Math.PI);
  if(isPlayer && player.tilt) ctx.rotate(player.tilt * 0.12);

  var sf = styleDef || ENEMY_STYLES[0];
  var w = carW * sf.w, h = carH * sf.h;

  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.beginPath();
  ctx.ellipse(4, 6, w * 0.48, h * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();

  drawWheel(-w * 0.44, -h * 0.24, w * 0.17);
  drawWheel(w * 0.44, -h * 0.24, w * 0.17);
  drawWheel(-w * 0.44, h * 0.2, w * 0.17);
  drawWheel(w * 0.44, h * 0.2, w * 0.17);

  ctx.beginPath();
  ctx.moveTo(-w * 0.36, h * 0.4);
  ctx.lineTo(-w * 0.44, h * 0.05);
  ctx.quadraticCurveTo(-w * 0.34, -h * 0.42, 0, -h * 0.46);
  ctx.quadraticCurveTo(w * 0.34, -h * 0.42, w * 0.44, h * 0.05);
  ctx.lineTo(w * 0.36, h * 0.4);
  ctx.quadraticCurveTo(0, h * 0.5, -w * 0.36, h * 0.4);
  ctx.closePath();
  var bodyGrad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
  bodyGrad.addColorStop(0, darkenColor(color, 45));
  bodyGrad.addColorStop(0.25, color);
  bodyGrad.addColorStop(0.55, lightenColor(color, 25));
  bodyGrad.addColorStop(1, darkenColor(color, 45));
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.strokeStyle = darkenColor(color, 70);
  ctx.lineWidth = Math.max(1.5, w * 0.04);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-w * 0.24, -h * 0.05);
  ctx.lineTo(-w * 0.18, -h * 0.34);
  ctx.lineTo(w * 0.18, -h * 0.34);
  ctx.lineTo(w * 0.24, -h * 0.05);
  ctx.closePath();
  var glassGrad = ctx.createLinearGradient(0, -h * 0.34, 0, -h * 0.05);
  glassGrad.addColorStop(0, "rgba(129,212,250,0.9)");
  glassGrad.addColorStop(1, "rgba(227,242,253,0.75)");
  ctx.fillStyle = glassGrad;
  ctx.fill();

  ctx.fillStyle = "rgba(255,255,100,0.95)";
  ctx.beginPath();
  ctx.ellipse(-w * 0.28, -h * 0.38, w * 0.1, h * 0.05, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.28, -h * 0.38, w * 0.1, h * 0.05, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#d32f2f";
  ctx.fillRect(-w * 0.24, h * 0.34, w * 0.14, h * 0.05);
  ctx.fillRect(w * 0.1, h * 0.34, w * 0.14, h * 0.05);

  if(isPlayer){
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.fillRect(-w * 0.06, -h * 0.48, w * 0.12, h * 0.08);
    if(sel){
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, -h * 0.08, w * 0.22, 0, Math.PI * 2);
      ctx.clip();
      var avImg = imgCache[sel.id];
      if(avImg && avImg.complete){
        ctx.drawImage(avImg, -w * 0.22, -h * 0.08 - w * 0.22, w * 0.44, w * 0.44);
      } else {
        ctx.font = (w * 0.38) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(sel.em, 0, -h * 0.08);
      }
      ctx.restore();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -h * 0.08, w * 0.22, 0, Math.PI * 2);
      ctx.stroke();
    }
    if((invincible > 0 || buffs.shield > 0) && Math.floor(frameCount / 6) % 2 === 0){
      ctx.strokeStyle = "rgba(66,165,245,0.8)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(0, 0, w * 0.62, 0, Math.PI * 2);
      ctx.stroke();
    }
    if(buffs.nitro > 0 || nitroHeld){
      ctx.fillStyle = "rgba(255,152,0," + (0.35 + Math.random() * 0.25) + ")";
      ctx.beginPath();
      ctx.ellipse(0, h * 0.48, w * 0.12, h * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if(sf.id === "truck"){
    ctx.fillStyle = darkenColor(color, 20);
    roundRect(-w * 0.38, h * 0.02, w * 0.76, h * 0.22, 3);
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill();
}

function drawPickup(e){
  ctx.save();
  ctx.translate(e._x, e._y);
  ctx.rotate(e.spin * 0.04);
  var size = carW * 0.72;
  if(e.type === "coin"){
    ctx.font = size + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("⭐", 0, 0);
  } else if(e.type === "oil"){
    ctx.fillStyle = "rgba(30,30,30,0.75)";
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 0.55, size * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(80,80,80,0.5)";
    ctx.beginPath();
    ctx.ellipse(-size * 0.12, -size * 0.08, size * 0.18, size * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    var em = ({shield:"🛡️",nitro:"⚡",magnet:"🧲",heart:"❤️"})[e.type] || "✨";
    ctx.font = size + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(em, 0, 0);
  }
  ctx.restore();
}

function drawFloatTexts(){
  for(var i = floatTexts.length - 1; i >= 0; i--){
    var f = floatTexts[i];
    f.y -= 1.2;
    f.life--;
    if(f.life <= 0){ floatTexts.splice(i, 1); continue; }
    ctx.globalAlpha = f.life / 42;
    ctx.fillStyle = f.color;
    ctx.font = "bold " + Math.floor(carW * 0.38) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  }
}

function drawParticles(){
  for(var i = particles.length - 1; i >= 0; i--){
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life--;
    if(p.life <= 0){ particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life / 35;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function updatePlayer(){
  var lerp = player.oilSlide > 0 ? 0.1 : 0.2;
  player.lane += (player.targetLane - player.lane) * lerp;
  player.tilt *= 0.8;
  player.x = laneXAt(player.lane);
  if(Math.abs(player.targetLane - player.lane) < 0.02) player.lane = player.targetLane;
  if(player.oilSlide > 0) player.oilSlide--;
}

function entitySize(e){
  if(e.type === "enemy") return e.style || ENEMY_STYLES[0];
  return {w:0.7, h:0.7};
}

function updateEntities(){
  var nitroMul = (buffs.nitro > 0 || nitroHeld) ? 1.55 : 1;
  var move = speed * 2.2 * nitroMul;
  for(var i = entities.length - 1; i >= 0; i--){
    var e = entities[i];
    e.y += move;
    e.spin = (e.spin || 0) + 0.08;

    if(buffs.magnet > 0 && (e.type === "coin" || POWERUP_KINDS.indexOf(e.type) >= 0)){
      var dx = player.x - laneX[e.lane];
      if(Math.abs(dx) > 4){
        e.lane += dx > 0 ? 0.06 : -0.06;
        if(e.lane < 0) e.lane = 0;
        if(e.lane > LANES - 1) e.lane = LANES - 1;
      }
    }

    var sz = entitySize(e);
    if(e.y > H + carH * sz.h){ entities.splice(i, 1); continue; }

    e._x = laneXAt(e.lane);
    e._y = e.y;

    if(e.type === "enemy"){
      var laneDist = Math.abs(e.lane - player.lane);
      var yDist = Math.abs(e.y - playerY);
      var hitW = (sz.w + 0.92) * 0.22;
      if(yDist < carH * 0.68 * Math.max(sz.h, 1) && laneDist < hitW){
        if(invincible <= 0 && buffs.shield <= 0){
          lives--;
          invincible = 90;
          combo = 0;
          comboTimer = 0;
          shakeFrames = 14;
          playCrash();
          addParticles(player.x, playerY, "#ff5252", 18);
          entities.splice(i, 1);
          if(lives <= 0) endGame();
        } else {
          entities.splice(i, 1);
          addParticles(e._x, e._y, "#90caf9", 10);
        }
      } else if(!e.nearMissed && yDist < carH * 0.95 && laneDist >= hitW && laneDist < 0.62 && e.y > playerY - carH){
        e.nearMissed = true;
        var bonus = 15 * Math.min(5, Math.max(1, combo));
        distance += bonus;
        playNearMiss();
        addFloatText(player.x, playerY - 40, "+" + bonus + " 超车!", "#ffeb3b");
        addParticles(e._x, e._y, "#fff59d", 6);
      }
    } else if(e.type === "oil"){
      if(Math.abs(e.y - playerY) < carH * 0.55 && Math.abs(e.lane - player.lane) < 0.38){
        player.oilSlide = 50;
        addFloatText(player.x, playerY - 20, "打滑!", "#9e9e9e");
        entities.splice(i, 1);
      }
    } else if(Math.abs(e.y - playerY) < carH * 0.55 && Math.abs(e.lane - player.lane) < 0.38){
      if(e.type === "coin"){
        coins++;
        var pts = 10 * Math.min(5, Math.max(1, combo));
        distance += pts;
        bumpCombo();
        playCoin();
        addFloatText(e._x, e._y, "+" + pts, "#ffd700");
        addParticles(e._x, e._y, "#ffd700", 8);
        entities.splice(i, 1);
      } else if(POWERUP_KINDS.indexOf(e.type) >= 0){
        applyPowerup(e.type);
        bumpCombo();
        distance += 20;
        addParticles(e._x, e._y, "#e1bee7", 10);
        entities.splice(i, 1);
      }
    }
  }

  for(var s = skidMarks.length - 1; s >= 0; s--){
    skidMarks[s].life--;
    if(skidMarks[s].life <= 0) skidMarks.splice(s, 1);
  }
}

function drawEntities(){
  entities.sort(function(a, b){ return a.y - b.y; });
  for(var i = 0; i < entities.length; i++){
    var e = entities[i];
    if(e.type === "enemy") drawStyledCar(e._x, e._y, e.style, e.color, false, true);
    else drawPickup(e);
  }
}

function gameLoop(){
  if(gameState === "over") return;
  if(gameState !== "playing" && gameState !== "ready" && gameState !== "paused") return;
  frameCount++;
  if(gameState === "playing"){
    var nitroMul = (buffs.nitro > 0 || nitroHeld) ? 1.5 : 1;
    distance += speed * 0.18 * nitroMul;
    if(speed < maxSpeed) speed += 0.0007;
    if(nitroHeld && frameCount % 8 === 0) playNitro();

    var nextWave = Math.floor(distance / 500) + 1;
    if(nextWave > wave){
      wave = nextWave;
      waveBannerTimer = 90;
      document.getElementById("waveBanner").textContent = "🏁 第 " + wave + " 段赛道";
      document.getElementById("waveBanner").classList.add("show");
      playWave();
    }
    if(waveBannerTimer > 0){
      waveBannerTimer--;
      if(waveBannerTimer <= 0) document.getElementById("waveBanner").classList.remove("show");
    }

    if(comboTimer > 0){ comboTimer--; if(comboTimer <= 0) combo = 0; }
    if(buffs.shield > 0) buffs.shield--;
    if(buffs.nitro > 0) buffs.nitro--;
    if(buffs.magnet > 0) buffs.magnet--;

    spawnTimer++;
    var interval = Math.max(48, 135 - speed * 9 - wave * 3);
    if(spawnTimer >= interval){
      spawnTimer = 0;
      spawnEnemy();
      if(Math.random() < 0.18 + wave * 0.03) spawnEnemy();
      if(Math.random() < 0.12) spawnOil();
    }
    itemTimer++;
    if(itemTimer >= 70){
      itemTimer = 0;
      var roll = Math.random();
      if(roll < 0.42) spawnPickup("coin");
      else if(roll < 0.58) spawnPickup(POWERUP_KINDS[Math.floor(Math.random() * POWERUP_KINDS.length)]);
    }
    if(invincible > 0) invincible--;
    updatePlayer();
    updateEntities();
    updateHUD();
  }

  var shakeX = 0, shakeY = 0;
  if(shakeFrames > 0){
    shakeX = (Math.random() - 0.5) * 10;
    shakeY = (Math.random() - 0.5) * 10;
    shakeFrames--;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawRoad();
  drawEntities();
  drawStyledCar(player.x, playerY, {id:"player", w:0.96, h:1.38}, sel ? sel.co : "#e53935", true, false);
  drawParticles();
  drawFloatTexts();
  ctx.restore();

  gameLoopId = requestAnimationFrame(gameLoop);
}

function setNitro(on){
  if(gameState !== "playing") return;
  nitroHeld = on;
}

function bindInput(){
  if(inputBound) return;
  inputBound = true;
  document.addEventListener("keydown", function(e){
    if(e.key === "ArrowLeft" || e.key === "a" || e.key === "A"){ e.preventDefault(); laneChange(-1); }
    if(e.key === "ArrowRight" || e.key === "d" || e.key === "D"){ e.preventDefault(); laneChange(1); }
    if(e.key === " " || e.key === "ArrowUp" || e.key === "w" || e.key === "W"){
      if(gameState === "ready"){ beginPlay(); e.preventDefault(); }
      else { setNitro(true); e.preventDefault(); }
    }
    if(e.key === "Enter" && gameState === "ready"){ beginPlay(); e.preventDefault(); }
    if(e.key === "p" || e.key === "P" || e.key === "Escape") togglePause();
  });
  document.addEventListener("keyup", function(e){
    if(e.key === " " || e.key === "ArrowUp" || e.key === "w" || e.key === "W") setNitro(false);
  });
  var wrap = document.getElementById("gameWrapper");
  var touchStartX = 0;
  wrap.addEventListener("touchstart", function(e){
    if(gameState === "ready"){ beginPlay(); return; }
    touchStartX = e.touches[0].clientX;
  }, {passive:true});
  wrap.addEventListener("touchend", function(e){
    if(gameState !== "playing") return;
    var dx = (e.changedTouches[0].clientX - touchStartX);
    if(Math.abs(dx) > 24) laneChange(dx > 0 ? 1 : -1);
  }, {passive:true});
  wrap.addEventListener("click", function(){
    if(gameState === "ready") beginPlay();
  });
  document.getElementById("btnLeft").addEventListener("touchstart", function(e){ e.preventDefault(); laneChange(-1); });
  document.getElementById("btnRight").addEventListener("touchstart", function(e){ e.preventDefault(); laneChange(1); });
  document.getElementById("btnLeft").addEventListener("click", function(){ laneChange(-1); });
  document.getElementById("btnRight").addEventListener("click", function(){ laneChange(1); });
  var btnNitro = document.getElementById("btnNitro");
  btnNitro.addEventListener("touchstart", function(e){ e.preventDefault(); setNitro(true); });
  btnNitro.addEventListener("touchend", function(e){ e.preventDefault(); setNitro(false); });
  btnNitro.addEventListener("mousedown", function(){ setNitro(true); });
  btnNitro.addEventListener("mouseup", function(){ setNitro(false); });
  btnNitro.addEventListener("mouseleave", function(){ setNitro(false); });
}

function beginPlay(){
  if(gameState !== "ready") return;
  gameState = "playing";
  document.getElementById("readyMsg").style.display = "none";
  playStart();
}

function startGame(){
  if(!sel) return;
  unlockAudio();
  document.getElementById("charSelect").classList.remove("active");
  document.getElementById("gameUI").classList.add("active");
  document.getElementById("gameOverOverlay").classList.remove("show");
  document.getElementById("readyMsg").style.display = "block";
  document.getElementById("pauseMsg").style.display = "none";
  canvas = document.getElementById("gameCanvas");
  ctx = canvas.getContext("2d");
  resizeCanvas();
  resetGame();
  gameState = "ready";
  bindInput();
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  gameLoop();
  window.addEventListener("resize", resizeCanvas);
}

function togglePause(){
  if(gameState === "playing"){
    prevStateForPause = "playing";
    gameState = "paused";
    document.getElementById("pauseMsg").style.display = "block";
    document.getElementById("btnPause").textContent = "▶️";
  } else if(gameState === "paused"){
    gameState = prevStateForPause || "playing";
    document.getElementById("pauseMsg").style.display = "none";
    document.getElementById("btnPause").textContent = "⏸️";
    gameLoop();
  }
}

function endGame(){
  gameState = "over";
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  saveBest();
  var finalScore = Math.floor(distance);
  document.getElementById("goScore").textContent = finalScore + " m";
  document.getElementById("goBest").textContent = bestScore;
  document.getElementById("goEmoji").textContent = lives <= 0 ? "💥" : "🏁";
  var isNew = finalScore >= bestScore && finalScore > 0;
  document.getElementById("newBestBadge").style.display = isNew ? "inline-block" : "none";
  if(isNew) playNewBest();
  document.getElementById("gameOverOverlay").classList.add("show");
}

function restartGame(){
  document.getElementById("gameOverOverlay").classList.remove("show");
  resetGame();
  gameState = "ready";
  document.getElementById("readyMsg").style.display = "block";
  gameLoop();
}

function goHome(){
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  gameState = "menu";
  document.getElementById("gameUI").classList.remove("active");
  document.getElementById("charSelect").classList.add("active");
  document.getElementById("gameOverOverlay").classList.remove("show");
}

document.addEventListener("keydown", function(e){
  if(!document.getElementById("charSelect").classList.contains("active")) return;
  if(e.key === "ArrowRight"){ e.preventDefault(); selectCharByIndex((charKeyFocus + 1) % CHARS.length); }
  if(e.key === "ArrowLeft"){ e.preventDefault(); selectCharByIndex((charKeyFocus - 1 + CHARS.length) % CHARS.length); }
  if(e.key === "ArrowDown"){ e.preventDefault(); selectCharByIndex((charKeyFocus + 4) % CHARS.length); }
  if(e.key === "ArrowUp"){ e.preventDefault(); selectCharByIndex((charKeyFocus - 4 + CHARS.length) % CHARS.length); }
  if(e.key === "Enter"){ e.preventDefault(); startGame(); }
});

buildCharGrid();
loadBest();
</script>
</body>
</html>
