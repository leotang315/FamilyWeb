<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小塔小游戏 - 接水果</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Comic Sans MS','Chalkboard SE','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#fff8e1,#ffe0b2,#ffcc80);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
#app{width:100%;max-width:780px;padding:12px;position:relative}
.page{display:none;flex-direction:column;align-items:center}
.page.active{display:flex}
.game-header{text-align:center;margin-bottom:10px;width:100%}
.game-header h1{font-size:clamp(22px,5vw,36px);color:#5a3e1b;text-shadow:2px 2px 0 #ffd54f;letter-spacing:2px}
.game-header .subtitle{font-size:clamp(12px,2.5vw,16px);color:#8b6b3d}
#charSelect .char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;width:100%;max-width:520px}
.char-card{background:#fff;border-radius:20px;padding:12px 8px 10px;cursor:pointer;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:all .2s;border:3px solid transparent}
.char-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.char-card.selected{border-color:#ff9800;background:#fff8e1}
.char-card.key-focus{box-shadow:0 0 0 3px #ff9800,0 6px 20px rgba(0,0,0,.2);transform:translateY(-3px)}
.char-card .char-preview{width:64px;height:64px;margin:0 auto 6px;border-radius:50%;background:#f0ebe3;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.char-card .char-preview img{width:100%;height:100%;object-fit:cover}
.char-card .char-name{font-size:13px;color:#5a3e1b;font-weight:bold}
.btn-start{background:#ff9800;color:#fff;border:none;border-radius:20px;padding:14px 48px;font-size:20px;font-weight:bold;cursor:pointer;box-shadow:0 4px 0 #e65100;font-family:inherit;margin-top:4px}
.btn-start:active{transform:translateY(2px);box-shadow:0 2px 0 #e65100}
.btn-home{background:#ddd;color:#5a3e1b;border:none;border-radius:14px;padding:10px 20px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #bbb}
.btn-home:active{transform:translateY(2px)}
.btn-pause{background:#ffc107;color:#5a3e1b;border:none;border-radius:14px;padding:8px 14px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #cc9a06;margin-right:6px}
.btn-pause:active{transform:translateY(2px)}
.info-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;background:rgba(255,255,255,.88);border-radius:16px;padding:8px 16px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);gap:8px;flex-wrap:wrap}
.info-bar .info-item{display:flex;align-items:center;gap:5px;font-size:clamp(13px,2.5vw,16px);color:#5a3e1b;font-weight:bold}
.game-wrapper{position:relative;width:100%;max-width:700px;aspect-ratio:3/4;border-radius:20px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.25);touch-action:none;background:#87ceeb;cursor:grab}
.game-wrapper:active{cursor:grabbing}
#gameCanvas{display:block;width:100%;height:100%;image-rendering:auto}
#hudScore{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:clamp(24px,6vw,44px);font-weight:bold;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.35);pointer-events:none;z-index:5}
#readyMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-size:clamp(16px,3.5vw,24px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.3);pointer-events:none;z-index:5;text-align:center;font-weight:bold;line-height:1.6}
#readyMsg .tap-icon{font-size:clamp(36px,9vw,56px);display:block;margin-bottom:8px;animation:bounce 1s infinite}
#pauseMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(22px,5vw,32px);color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.4);pointer-events:none;z-index:5;font-weight:bold;display:none;background:rgba(0,0,0,.5);padding:16px 32px;border-radius:20px}
#comboPop{position:absolute;top:28%;left:50%;transform:translateX(-50%);font-size:clamp(18px,4vw,28px);color:#ffd700;font-weight:bold;text-shadow:2px 2px 0 rgba(0,0,0,.4);pointer-events:none;z-index:6;opacity:0;transition:opacity .2s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#gameOverOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
#gameOverOverlay.show{display:flex}
.win-card{background:#fff;border-radius:32px;padding:32px 28px 24px;text-align:center;max-width:400px;width:90%;box-shadow:0 12px 48px rgba(0,0,0,.3);animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.win-card .big-emoji{font-size:72px;margin-bottom:8px}
.win-card h2{font-size:28px;color:#5a3e1b;margin-bottom:4px}
.win-card .score-big{font-size:52px;font-weight:bold;color:#ff9800;margin:8px 0}
.win-card .best-label{font-size:16px;color:#8b6b3d;margin-bottom:16px}
.win-card .best-label span{color:#5a3e1b;font-weight:bold}
.win-card .new-best{display:inline-block;background:#ffd700;color:#5a3e1b;padding:4px 12px;border-radius:12px;font-size:14px;font-weight:bold;margin-bottom:10px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.win-card .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.win-card button{padding:10px 24px;border:none;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 rgba(0,0,0,.15)}
.win-card button:active{transform:translateY(2px)}
.win-card .btn-again{background:#ff9800;color:#fff;box-shadow:0 3px 0 #e65100}
.win-card .btn-home{background:#ddd;color:#5a3e1b;box-shadow:0 3px 0 #bbb}
</style>
</head>
<body>

<div id="app">
  <div id="charSelect" class="page active">
    <div class="game-header"><h1>🍎 接水果大作战 🍊</h1><div class="subtitle">接住水果得分，躲开炸弹！</div></div>
    <div class="char-grid" id="charGrid"></div>
    <button class="btn-start" onclick="startGame()">开始游戏 🎮</button>
  </div>

  <div id="gameUI" class="page">
    <div class="info-bar">
      <div class="info-item"><span id="charEmojiDisplay">🐰</span><span id="charNameDisplay">beta</span></div>
      <div class="info-item">❤️ <span id="livesDisplay">3</span></div>
      <div class="info-item">🏆 <span id="bestScoreDisplay">0</span></div>
      <div style="display:flex">
        <button class="btn-pause" id="btnPause" onclick="togglePause()">⏸️</button>
        <button class="btn-home" onclick="goHome()">🏠 主页</button>
      </div>
    </div>
    <div class="game-wrapper" id="gameWrapper">
      <canvas id="gameCanvas"></canvas>
      <div id="hudScore">0</div>
      <div id="comboPop"></div>
      <div id="readyMsg"><span class="tap-icon">👆</span>左右滑动或按 ← → 移动<br>点击开始</div>
      <div id="pauseMsg">⏸ 已暂停</div>
    </div>
  </div>

  <div id="gameOverOverlay">
    <div class="win-card">
      <div class="big-emoji" id="goEmoji">😵</div>
      <h2>游戏结束</h2>
      <div id="newBestBadge" class="new-best" style="display:none">🎉 新纪录！</div>
      <div class="score-big" id="goScore">0</div>
      <div class="best-label">🏆 最高纪录: <span id="goBest">0</span></div>
      <div class="btn-group">
        <button class="btn-again" onclick="restartGame()">再来一次 🔄</button>
        <button class="btn-home" onclick="goHome()">🏠 选角色</button>
      </div>
    </div>
  </div>
</div>

<script>
var CHARS = [
  {id:"a", nm:"beta",   em:"🐰", co:"#FFB7C5", img:"role/beta2.JPG"},
  {id:"b", nm:"dad",    em:"🦊", co:"#FFD700", img:"role/dad.JPG"},
  {id:"c", nm:"mum",    em:"👩", co:"#FF69B4", img:"role/mum.JPG"},
  {id:"i", nm:"Duggee", em:"🐶", co:"#FFB347", img:"role/duggee.png"},
  {id:"j", nm:"Betty",  em:"🐙", co:"#FF69B4", img:"role/betty.png"},
  {id:"k", nm:"Happy",  em:"🐸", co:"#90EE90", img:"role/happy.png"},
  {id:"l", nm:"Norrie", em:"🐭", co:"#87CEEB", img:"role/norrie.png"},
  {id:"m", nm:"Roly",   em:"🐹", co:"#DDA0DD", img:"role/roly.png"},
  {id:"n", nm:"Tag",    em:"🦏", co:"#FFD700", img:"role/tag.png"}
];

var FRUITS = [
  {em:"🍎", pts:10, color:"#ff5252"},
  {em:"🍊", pts:10, color:"#ff9800"},
  {em:"🍌", pts:15, color:"#ffeb3b"},
  {em:"🍇", pts:15, color:"#9c27b0"},
  {em:"🍓", pts:20, color:"#e91e63"},
  {em:"🍑", pts:20, color:"#ffab91"},
  {em:"🍉", pts:25, color:"#4caf50"}
];

var sel = null, charKeyFocus = 0, imgCache = {};
var canvas, ctx, W, H;
var player, items, particles;
var score, lives, bestScore, combo;
var gameState, frameCount, spawnTimer;
var baseSpeed, keys = {};
var gameLoopId = null, prevStateForPause = null;
var flashFrames = 0, startBest = 0, inputBound = false;

var audioCtx = null;
function unlockAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function playTone(freq, dur, type, vol){
  if(!audioCtx) return;
  try{
    var osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.28, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  }catch(e){}
}
function playCatch(){ playTone(660, 0.08, "sine", 0.3); setTimeout(function(){ playTone(880, 0.1, "sine", 0.28); }, 60); }
function playBomb(){ playTone(180, 0.3, "sawtooth", 0.35); setTimeout(function(){ playTone(100, 0.25, "sawtooth", 0.3); }, 100); }
function playSelect(){ playTone(660, 0.08, "sine", 0.25); setTimeout(function(){ playTone(880, 0.1, "sine", 0.25); }, 60); }
function playStart(){ playTone(523, 0.1, "sine", 0.28); setTimeout(function(){ playTone(784, 0.15, "sine", 0.3); }, 100); }
function playNewBest(){
  playTone(880, 0.12, "sine", 0.32);
  setTimeout(function(){ playTone(1100, 0.12, "sine", 0.32); }, 120);
  setTimeout(function(){ playTone(1320, 0.2, "sine", 0.32); }, 240);
}

document.addEventListener("click", unlockAudio, {once:false});
document.addEventListener("touchstart", unlockAudio, {once:false, passive:true});
document.addEventListener("keydown", unlockAudio, {once:false});

function selectCharByIndex(idx){
  if(idx < 0 || idx >= CHARS.length) return;
  charKeyFocus = idx; sel = CHARS[idx];
  var cards = document.querySelectorAll("#charGrid .char-card");
  for(var k = 0; k < cards.length; k++) cards[k].classList.remove("selected", "key-focus");
  if(cards[idx]){ cards[idx].classList.add("selected", "key-focus"); }
}
function buildCharGrid(){
  var grid = document.getElementById("charGrid");
  grid.innerHTML = "";
  for(var i = 0; i < CHARS.length; i++){
    (function(ch, idx){
      var card = document.createElement("div");
      card.className = "char-card";
      var preview = document.createElement("div");
      preview.className = "char-preview";
      if(ch.img){
        var img = new Image();
        img.onload = function(){ imgCache[ch.id] = img; };
        img.src = ch.img;
        var imgEl = document.createElement("img");
        imgEl.src = ch.img;
        imgEl.onerror = function(){ preview.textContent = ch.em; imgEl.remove(); };
        preview.appendChild(imgEl);
      } else {
        preview.textContent = ch.em;
      }
      var name = document.createElement("div");
      name.className = "char-name";
      name.textContent = ch.nm;
      card.appendChild(preview); card.appendChild(name);
      card.onclick = function(){ unlockAudio(); playSelect(); selectCharByIndex(idx); };
      grid.appendChild(card);
      if(idx === 0){ card.classList.add("selected"); sel = ch; }
    })(CHARS[i], i);
  }
}

document.addEventListener("keydown", function(e){
  var charPage = document.getElementById("charSelect");
  if(charPage.classList.contains("active")){
    var cols = 4, n = CHARS.length;
    if(e.key === "ArrowRight"){ selectCharByIndex(Math.min(n - 1, charKeyFocus + 1)); e.preventDefault(); }
    else if(e.key === "ArrowLeft"){ selectCharByIndex(Math.max(0, charKeyFocus - 1)); e.preventDefault(); }
    else if(e.key === "ArrowDown"){ selectCharByIndex(Math.min(n - 1, charKeyFocus + cols)); e.preventDefault(); }
    else if(e.key === "ArrowUp"){ selectCharByIndex(Math.max(0, charKeyFocus - cols)); e.preventDefault(); }
    else if(e.key === "Enter" || e.key === " "){ startGame(); e.preventDefault(); }
    return;
  }
  if(e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
  if(e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
  if(e.key === " " || e.key === "Enter"){
    if(gameState === "ready") beginPlay();
    e.preventDefault();
  }
});
document.addEventListener("keyup", function(e){
  if(e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
  if(e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
});

function startGame(){
  unlockAudio();
  if(!sel) sel = CHARS[0];
  document.getElementById("charEmojiDisplay").textContent = sel.em;
  document.getElementById("charNameDisplay").textContent = sel.nm;
  document.getElementById("charSelect").classList.remove("active");
  document.getElementById("gameUI").classList.add("active");
  bestScore = parseInt(localStorage.getItem("fruitBest") || "0", 10);
  startBest = bestScore;
  document.getElementById("bestScoreDisplay").textContent = bestScore;
  initGame();
}

function goHome(){
  if(gameLoopId){ cancelAnimationFrame(gameLoopId); gameLoopId = null; }
  document.getElementById("gameOverOverlay").classList.remove("show");
  document.getElementById("gameUI").classList.remove("active");
  document.getElementById("charSelect").classList.add("active");
}

function restartGame(){
  document.getElementById("gameOverOverlay").classList.remove("show");
  initGame();
}

function initGame(){
  canvas = document.getElementById("gameCanvas");
  ctx = canvas.getContext("2d");
  resizeCanvas();
  score = 0; lives = 3; combo = 0; frameCount = 0; spawnTimer = 0;
  items = []; particles = []; flashFrames = 0;
  gameState = "ready";
  keys = {left:false, right:false};
  baseSpeed = Math.max(2, H * 0.004);

  document.getElementById("hudScore").textContent = "0";
  document.getElementById("livesDisplay").textContent = lives;
  document.getElementById("readyMsg").style.display = "block";
  document.getElementById("readyMsg").innerHTML = '<span class="tap-icon">' + sel.em + '</span>左右滑动或按 ← → 移动<br>点击开始';
  document.getElementById("pauseMsg").style.display = "none";
  document.getElementById("comboPop").style.opacity = "0";
  document.getElementById("gameOverOverlay").classList.remove("show");
  document.getElementById("btnPause").textContent = "⏸️";

  var pw = Math.round(W * 0.18);
  player = { x: W / 2, y: H * 0.88, w: pw, h: pw, targetX: W / 2, speed: W * 0.012 };

  bindInput();
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  gameLoop();
}

function resizeCanvas(){
  var rect = document.getElementById("gameWrapper").getBoundingClientRect();
  canvas.width = Math.round(rect.width);
  canvas.height = Math.round(rect.height);
  W = canvas.width; H = canvas.height;
}

function bindInput(){
  if(inputBound) return;
  inputBound = true;
  var wrap = document.getElementById("gameWrapper");
  function setTarget(clientX){
    var rect = canvas.getBoundingClientRect();
    player.targetX = (clientX - rect.left) * (W / rect.width);
  }
  wrap.onmousedown = function(e){ if(gameState === "ready") beginPlay(); else setTarget(e.clientX); e.preventDefault(); };
  wrap.onmousemove = function(e){ if(e.buttons) setTarget(e.clientX); };
  wrap.ontouchstart = function(e){
    if(gameState === "ready") beginPlay();
    if(e.touches[0]) setTarget(e.touches[0].clientX);
    e.preventDefault();
  };
  wrap.ontouchmove = function(e){
    if(e.touches[0]) setTarget(e.touches[0].clientX);
    e.preventDefault();
  };
}

function beginPlay(){
  if(gameState !== "ready") return;
  gameState = "playing";
  document.getElementById("readyMsg").style.display = "none";
  playStart();
}

function togglePause(){
  if(gameState === "playing"){
    prevStateForPause = "playing";
    gameState = "paused";
    document.getElementById("pauseMsg").style.display = "block";
    document.getElementById("btnPause").textContent = "▶️";
  } else if(gameState === "paused"){
    gameState = prevStateForPause || "playing";
    document.getElementById("pauseMsg").style.display = "none";
    document.getElementById("btnPause").textContent = "⏸️";
  }
}

function spawnItem(){
  var margin = W * 0.08;
  var x = margin + Math.random() * (W - margin * 2);
  var bombChance = Math.min(0.12 + score * 0.002, 0.28);
  if(Math.random() < bombChance){
    items.push({ x:x, y:-40, r:W*0.045, em:"💣", bomb:true, speed:baseSpeed*(0.9+Math.random()*0.3), rot:0, rotSpd:(Math.random()-0.5)*0.08 });
  } else {
    var f = FRUITS[Math.floor(Math.random() * FRUITS.length)];
    items.push({ x:x, y:-40, r:W*0.042, em:f.em, bomb:false, pts:f.pts, color:f.color, speed:baseSpeed*(0.85+Math.random()*0.35), rot:0, rotSpd:(Math.random()-0.5)*0.06 });
  }
}

function addParticles(x, y, color, n){
  for(var i = 0; i < n; i++){
    particles.push({
      x:x, y:y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6-2,
      life:30+Math.random()*20,
      color:color,
      size:3+Math.random()*4
    });
  }
}

function showCombo(text){
  var el = document.getElementById("comboPop");
  el.textContent = text;
  el.style.opacity = "1";
  clearTimeout(showCombo._t);
  showCombo._t = setTimeout(function(){ el.style.opacity = "0"; }, 800);
}

function catchItem(it, idx){
  items.splice(idx, 1);
  if(it.bomb){
    lives--;
    combo = 0;
    flashFrames = 18;
    document.getElementById("livesDisplay").textContent = lives;
    addParticles(it.x, player.y - player.h*0.3, "#ff5252", 16);
    playBomb();
    showCombo("💥 炸弹！");
    if(lives <= 0) gameOver();
  } else {
    combo++;
    var bonus = combo >= 5 ? Math.floor(combo / 5) * 5 : 0;
    var gained = it.pts + bonus;
    score += gained;
    document.getElementById("hudScore").textContent = score;
    addParticles(it.x, player.y - player.h*0.3, it.color || "#ff9800", 12);
    playCatch();
    if(combo >= 3 && combo % 3 === 0) showCombo("🔥 连击 x" + combo + "!");
    if(score > bestScore){
      bestScore = score;
      localStorage.setItem("fruitBest", bestScore);
      document.getElementById("bestScoreDisplay").textContent = bestScore;
    }
  }
}

function gameOver(){
  gameState = "dead";
  var isNew = score > startBest;
  if(isNew){
    bestScore = score;
    localStorage.setItem("fruitBest", bestScore);
    playNewBest();
  }
  document.getElementById("goEmoji").textContent = lives <= 0 ? "😵" : "🍎";
  document.getElementById("goScore").textContent = score;
  document.getElementById("goBest").textContent = bestScore;
  document.getElementById("newBestBadge").style.display = isNew ? "inline-block" : "none";
  document.getElementById("gameOverOverlay").classList.add("show");
}

function update(){
  if(gameState === "paused" || gameState === "dead") return;
  frameCount++;
  if(flashFrames > 0) flashFrames--;

  if(gameState === "playing"){
    var speedMul = 1 + Math.min(score * 0.015, 0.8);
    baseSpeed = Math.max(2, H * 0.004) * speedMul;

    if(keys.left) player.targetX -= player.speed * 1.5;
    if(keys.right) player.targetX += player.speed * 1.5;
    player.targetX = Math.max(player.w/2 + 4, Math.min(W - player.w/2 - 4, player.targetX));
    player.x += (player.targetX - player.x) * 0.22;

    spawnTimer++;
    var interval = Math.max(28, 55 - Math.floor(score / 30));
    if(spawnTimer >= interval){
      spawnTimer = 0;
      spawnItem();
      if(score > 40 && Math.random() < 0.35) spawnItem();
    }

    for(var i = items.length - 1; i >= 0; i--){
      var it = items[i];
      it.y += it.speed;
      it.rot += it.rotSpd;
      if(it.y - it.r > H + 20){ items.splice(i, 1); continue; }
      var dx = it.x - player.x;
      var dy = it.y - (player.y - player.h * 0.35);
      var dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < it.r + player.w * 0.38){
        catchItem(it, i);
      }
    }
  }

  for(var p = particles.length - 1; p >= 0; p--){
    var pt = particles[p];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--;
    if(pt.life <= 0) particles.splice(p, 1);
  }
}

function drawBg(){
  var grd = ctx.createLinearGradient(0, 0, 0, H);
  grd.addColorStop(0, "#87CEEB");
  grd.addColorStop(0.55, "#B3E5FC");
  grd.addColorStop(0.78, "#A5D6A7");
  grd.addColorStop(1, "#66BB6A");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.beginPath();
  ctx.arc(W*0.18, H*0.12, W*0.07, 0, Math.PI*2);
  ctx.arc(W*0.24, H*0.1, W*0.09, 0, Math.PI*2);
  ctx.arc(W*0.32, H*0.13, W*0.06, 0, Math.PI*2);
  ctx.fill();

  var gy = H * 0.82;
  ctx.fillStyle = "#558B2F";
  ctx.fillRect(0, gy, W, H - gy);
  ctx.fillStyle = "#7CB342";
  for(var g = 0; g < 8; g++){
    var gx = (g + 0.5) * W / 8;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx - 8, gy - 18, gx, gy - 28);
    ctx.quadraticCurveTo(gx + 8, gy - 18, gx, gy);
    ctx.fill();
  }
}

function drawPlayer(){
  var px = player.x, py = player.y, pw = player.w, ph = player.h;

  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.beginPath();
  ctx.ellipse(px, py + ph*0.42, pw*0.55, ph*0.12, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "#8D6E63";
  ctx.beginPath();
  ctx.moveTo(px - pw*0.55, py + ph*0.35);
  ctx.lineTo(px + pw*0.55, py + ph*0.35);
  ctx.quadraticCurveTo(px + pw*0.6, py + ph*0.5, px + pw*0.45, py + ph*0.5);
  ctx.lineTo(px - pw*0.45, py + ph*0.5);
  ctx.quadraticCurveTo(px - pw*0.6, py + ph*0.5, px - pw*0.55, py + ph*0.35);
  ctx.fill();

  var img = imgCache[sel.id];
  if(img && img.complete && img.naturalWidth){
    ctx.save();
    ctx.beginPath();
    ctx.arc(px, py - ph*0.05, pw*0.42, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(img, px - pw*0.42, py - ph*0.47, pw*0.84, pw*0.84);
    ctx.restore();
    ctx.strokeStyle = sel.co || "#fff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px, py - ph*0.05, pw*0.42, 0, Math.PI*2);
    ctx.stroke();
  } else {
    ctx.fillStyle = sel.co || "#FFB7C5";
    ctx.beginPath();
    ctx.arc(px, py - ph*0.05, pw*0.42, 0, Math.PI*2);
    ctx.fill();
    ctx.font = (pw*0.5) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(sel.em, px, py - ph*0.05);
  }
}

function drawItems(){
  for(var i = 0; i < items.length; i++){
    var it = items[i];
    ctx.save();
    ctx.translate(it.x, it.y);
    ctx.rotate(it.rot);
    ctx.font = (it.r * 2.2) + "px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if(it.bomb){
      ctx.shadowColor = "rgba(255,0,0,0.4)";
      ctx.shadowBlur = 8;
    }
    ctx.fillText(it.em, 0, 0);
    ctx.restore();
  }
}

function drawParticles(){
  for(var i = 0; i < particles.length; i++){
    var pt = particles[i];
    ctx.globalAlpha = Math.min(1, pt.life / 25);
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw(){
  if(flashFrames > 0 && flashFrames % 4 < 2){
    ctx.fillStyle = "rgba(255,80,80,0.25)";
    ctx.fillRect(0, 0, W, H);
  }
  drawBg();
  drawItems();
  drawPlayer();
  drawParticles();
}

function gameLoop(){
  update();
  draw();
  gameLoopId = requestAnimationFrame(gameLoop);
}

window.addEventListener("resize", function(){
  if(canvas){ resizeCanvas(); player.w = Math.round(W * 0.18); player.h = player.w; player.y = H * 0.88; }
});

buildCharGrid();
</script>
